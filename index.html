<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPG Equipment Ordering Portal</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            /* FPG Brand Colors */
            --fpg-blue-1: #1661AD;
            --fpg-blue-2: #004E7E;
            --fpg-orange-1: #DB802E;
            --fpg-orange-2: #B7622B;
            --fpg-yellow-1: #CBA128;
            --fpg-green-1: #568935;
            --fpg-black: #000000;
            --fpg-gray: #818285;
            --fpg-gray-dark: #4C4D4F;
            --fpg-white: #FFFFFF;
            
            /* Functional Colors */
            --primary: var(--fpg-blue-1);
            --primary-dark: var(--fpg-blue-2);
            --accent: var(--fpg-orange-1);
            --success: var(--fpg-green-1);
            --text: var(--fpg-black);
            --text-light: var(--fpg-gray);
            --border: #E5E7EB;
            --bg-light: #F9FAFB;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: var(--bg-light);
            color: var(--text);
            line-height: 1.6;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem 0;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .logo-section h1 {
            font-size: 1.75rem;
            font-weight: 300;
            letter-spacing: -0.5px;
        }
        
        .logo-section p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .cart-icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .cart-icon-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .cart-badge {
            background: var(--accent);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* Search & Filter Bar */
        .search-filter-bar {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 97, 173, 0.1);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }
        
        .filter-select {
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        /* Category Sections */
        .category-section {
            margin-bottom: 3rem;
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .category-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: var(--shadow-md);
        }
        
        .category-title h2 {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        
        .category-count {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        /* Product Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        
        /* Product Card */
        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border: 1px solid var(--border);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }
        
        .product-image-container {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .product-image-placeholder {
            color: var(--text-light);
            font-size: 3rem;
        }
        
        .recommended-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--fpg-orange-2) 100%);
            color: white;
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-md);
        }
        
        .product-content {
            padding: 1.5rem;
        }
        
        .product-title {
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 1rem;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        
        .product-items {
            margin-bottom: 1.25rem;
        }
        
        .product-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.875rem;
            color: var(--text-light);
            border-bottom: 1px solid var(--bg-light);
        }
        
        .product-item:last-child {
            border-bottom: none;
        }
        
        .product-item-name {
            flex: 1;
        }
        
        .product-item-price {
            font-weight: 600;
            color: var(--text);
        }
        
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 2px solid var(--bg-light);
        }
        
        .product-price {
            font-size: 2rem;
            font-weight: 300;
            color: var(--primary);
            letter-spacing: -1px;
        }
        
        .btn-add-cart {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-add-cart:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-add-cart:disabled {
            background: var(--fpg-gray);
            cursor: not-allowed;
            transform: none;
        }
        
        /* Shopping Cart Slide-in */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .cart-panel {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 480px;
            max-width: 90vw;
            background: white;
            box-shadow: var(--shadow-xl);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        
        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-light);
        }
        
        .cart-header h2 {
            font-size: 1.5rem;
            font-weight: 300;
        }
        
        .btn-close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .btn-close-cart:hover {
            background: var(--border);
            color: var(--text);
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }
        
        .cart-empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        
        .cart-item {
            background: var(--bg-light);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        
        .cart-item:hover {
            box-shadow: var(--shadow-sm);
        }
        
        .cart-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }
        
        .cart-item-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
            flex: 1;
        }
        
        .btn-remove {
            background: none;
            border: none;
            color: #EF4444;
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1.25rem;
            transition: all 0.3s;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-remove:hover {
            background: #FEE2E2;
        }
        
        .cart-item-details {
            color: var(--text-light);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }
        
        .cart-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: white;
            padding: 0.25rem;
            border-radius: 8px;
        }
        
        .btn-qty {
            background: var(--bg-light);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-qty:hover {
            background: var(--primary);
            color: white;
        }
        
        .qty-value {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }
        
        .cart-item-price {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .cart-summary {
            padding: 1.5rem;
            border-top: 2px solid var(--border);
            background: var(--bg-light);
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            font-size: 1rem;
        }
        
        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-top: 2px solid var(--border);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .btn-checkout {
            width: 100%;
            background: var(--success);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        
        .btn-checkout:hover {
            background: #3d6b25;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        /* Checkout Form */
        .checkout-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .checkout-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
        }
        
        .checkout-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
        }
        
        .checkout-header h2 {
            font-size: 1.75rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        
        .form-input, .form-textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }
        
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 97, 173, 0.1);
        }
        
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .btn-back {
            background: var(--fpg-gray);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }
        
        .btn-back:hover {
            background: var(--fpg-gray-dark);
        }
        
        .btn-submit {
            width: 100%;
            background: var(--success);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit:hover {
            background: #3d6b25;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        /* Success Screen */
        .success-container {
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
        }
        
        .success-card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
        }
        
        .success-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        .success-title {
            font-size: 2rem;
            font-weight: 300;
            color: var(--success);
            margin-bottom: 1rem;
        }
        
        .order-number {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            margin: 1.5rem 0;
        }
        
        .success-message {
            color: var(--text-light);
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        
        .btn-continue {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-continue:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .search-filter-bar {
                flex-direction: column;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .cart-panel {
                width: 100vw;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Load products from products.json (will be loaded dynamically)
        const loadProducts = async () => {
            try {
                const response = await fetch('./products.json');
                return await response.json();
            } catch (error) {
                // Fallback to empty if file doesn't exist yet
                return [];
            }
        };

        // Cart Service
        const CartService = {
            CART_KEY: 'fpg_equipment_cart_v2',
            
            getCart: () => {
                try {
                    const cart = localStorage.getItem(CartService.CART_KEY);
                    return cart ? JSON.parse(cart) : [];
                } catch (e) {
                    return [];
                }
            },
            
            saveCart: (cart) => {
                try {
                    localStorage.setItem(CartService.CART_KEY, JSON.stringify(cart));
                } catch (e) {
                    console.error('Error saving cart');
                }
            },
            
            clearCart: () => {
                localStorage.removeItem(CartService.CART_KEY);
            }
        };

        // Main App
        function App() {
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState(CartService.getCart());
            const [search, setSearch] = useState('');
            const [category, setCategory] = useState('all');
            const [showCart, setShowCart] = useState(false);
            const [showCheckout, setShowCheckout] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [orderNum, setOrderNum] = useState('');

            useEffect(() => {
                loadProducts().then(setProducts);
            }, []);

            useEffect(() => {
                CartService.saveCart(cart);
            }, [cart]);

            const addToCart = (product) => {
                const existing = cart.find(item => item.product.id === product.id);
                if (existing) {
                    setCart(cart.map(item =>
                        item.product.id === product.id
                            ? { ...item, quantity: item.quantity + 1 }
                            : item
                    ));
                } else {
                    setCart([...cart, { product, quantity: 1 }]);
                }
            };

            const updateQty = (productId, delta) => {
                setCart(cart.map(item =>
                    item.product.id === productId
                        ? { ...item, quantity: Math.max(0, item.quantity + delta) }
                        : item
                ).filter(item => item.quantity > 0));
            };

            const removeItem = (productId) => {
                setCart(cart.filter(item => item.product.id !== productId));
            };

            const submitOrder = async (data) => {
                const orderNumber = `FPG-${Date.now()}`;
                console.log('Order submitted:', { ...data, cart, total: cartTotal });
                setOrderNum(orderNumber);
                setSubmitted(true);
                setShowCheckout(false);
                setCart([]);
                CartService.clearCart();
            };

            const cartTotal = useMemo(() => {
                return cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
            }, [cart]);

            const cartCount = useMemo(() => {
                return cart.reduce((sum, item) => sum + item.quantity, 0);
            }, [cart]);

            const filtered = useMemo(() => {
                return products.filter(p => {
                    const matchesSearch = p.title.toLowerCase().includes(search.toLowerCase()) ||
                        p.items.some(item => item.name.toLowerCase().includes(search.toLowerCase()));
                    const matchesCategory = category === 'all' || p.category === category;
                    return matchesSearch && matchesCategory;
                });
            }, [products, search, category]);

            const byCategory = useMemo(() => {
                const grouped = {};
                filtered.forEach(product => {
                    if (!grouped[product.category]) {
                        grouped[product.category] = [];
                    }
                    grouped[product.category].push(product);
                });
                return grouped;
            }, [filtered]);

            const categories = {
                desktop: { name: 'Desktop Packages', icon: '🖥️', color: '#1661AD' },
                laptop: { name: 'Laptop Packages', icon: '💻', color: '#568935' },
                peripherals: { name: 'Peripherals', icon: '📦', color: '#DB802E' },
                specialty_laptop: { name: 'Specialty Laptops', icon: '⭐', color: '#CBA128' },
                tribucast: { name: 'Tribucast', icon: '📺', color: '#B7622B' }
            };

            if (submitted) {
                return <Success orderNum={orderNum} onContinue={() => setSubmitted(false)} />;
            }

            if (showCheckout) {
                return (
                    <Checkout
                        cart={cart}
                        total={cartTotal}
                        onBack={() => setShowCheckout(false)}
                        onSubmit={submitOrder}
                    />
                );
            }

            return (
                <>
                    <header className="header">
                        <div className="header-content">
                            <div className="logo-section">
                                <h1>FPG Equipment Ordering</h1>
                                <p>Foundation Partners Group</p>
                            </div>
                            <button className="cart-icon-btn" onClick={() => setShowCart(true)}>
                                🛒 Cart
                                {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
                            </button>
                        </div>
                    </header>

                    <div className="container">
                        <div className="search-filter-bar">
                            <div className="search-box">
                                <span className="search-icon">🔍</span>
                                <input
                                    type="text"
                                    className="search-input"
                                    placeholder="Search equipment..."
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>
                            <select
                                className="filter-select"
                                value={category}
                                onChange={(e) => setCategory(e.target.value)}
                            >
                                <option value="all">All Categories</option>
                                <option value="desktop">Desktop</option>
                                <option value="laptop">Laptop</option>
                                <option value="peripherals">Peripherals</option>
                                <option value="specialty_laptop">Specialty</option>
                                <option value="tribucast">Tribucast</option>
                            </select>
                        </div>

                        {Object.entries(byCategory).map(([cat, prods]) => {
                            const catInfo = categories[cat];
                            return (
                                <div key={cat} className="category-section">
                                    <div className="category-header">
                                        <div className="category-icon" style={{ background: catInfo.color }}>
                                            {catInfo.icon}
                                        </div>
                                        <div className="category-title">
                                            <h2>{catInfo.name}</h2>
                                            <span className="category-count">{prods.length} packages</span>
                                        </div>
                                    </div>
                                    <div className="products-grid">
                                        {prods.map(p => (
                                            <ProductCard
                                                key={p.id}
                                                product={p}
                                                onAdd={addToCart}
                                                inCart={cart.some(item => item.product.id === p.id)}
                                            />
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {showCart && (
                        <CartPanel
                            cart={cart}
                            total={cartTotal}
                            onClose={() => setShowCart(false)}
                            onUpdateQty={updateQty}
                            onRemove={removeItem}
                            onCheckout={() => {
                                setShowCart(false);
                                setShowCheckout(true);
                            }}
                        />
                    )}
                </>
            );
        }

        function ProductCard({ product, onAdd, inCart }) {
            return (
                <div className="product-card">
                    <div className="product-image-container">
                        <div className="product-image-placeholder">📦</div>
                        {product.recommended && (
                            <span className="recommended-badge">RECOMMENDED</span>
                        )}
                    </div>
                    <div className="product-content">
                        <h3 className="product-title">{product.title}</h3>
                        <div className="product-items">
                            {product.items.slice(0, 3).map((item, i) => (
                                <div key={i} className="product-item">
                                    <span className="product-item-name">{item.name}</span>
                                    <span className="product-item-price">${item.price.toLocaleString()}</span>
                                </div>
                            ))}
                            {product.items.length > 3 && (
                                <div className="product-item">
                                    <span className="product-item-name" style={{ fontStyle: 'italic' }}>
                                        +{product.items.length - 3} more items
                                    </span>
                                </div>
                            )}
                        </div>
                        <div className="product-footer">
                            <div className="product-price">${product.price.toLocaleString()}</div>
                            <button
                                className="btn-add-cart"
                                onClick={() => onAdd(product)}
                                disabled={inCart}
                            >
                                {inCart ? '✓ Added' : '+ Add'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function CartPanel({ cart, total, onClose, onUpdateQty, onRemove, onCheckout }) {
            return (
                <>
                    <div className="cart-overlay" onClick={onClose} />
                    <div className="cart-panel">
                        <div className="cart-header">
                            <h2>Shopping Cart</h2>
                            <button className="btn-close-cart" onClick={onClose}>×</button>
                        </div>
                        <div className="cart-items">
                            {cart.length === 0 ? (
                                <div className="cart-empty">
                                    <div className="cart-empty-icon">🛒</div>
                                    <p>Your cart is empty</p>
                                </div>
                            ) : (
                                cart.map(item => (
                                    <div key={item.product.id} className="cart-item">
                                        <div className="cart-item-header">
                                            <div className="cart-item-title">{item.product.title}</div>
                                            <button
                                                className="btn-remove"
                                                onClick={() => onRemove(item.product.id)}
                                            >
                                                ×
                                            </button>
                                        </div>
                                        <div className="cart-item-details">
                                            {item.product.items.slice(0, 2).map(i => i.name).join(', ')}
                                        </div>
                                        <div className="cart-item-footer">
                                            <div className="qty-controls">
                                                <button
                                                    className="btn-qty"
                                                    onClick={() => onUpdateQty(item.product.id, -1)}
                                                >
                                                    −
                                                </button>
                                                <span className="qty-value">{item.quantity}</span>
                                                <button
                                                    className="btn-qty"
                                                    onClick={() => onUpdateQty(item.product.id, 1)}
                                                >
                                                    +
                                                </button>
                                            </div>
                                            <div className="cart-item-price">
                                                ${(item.product.price * item.quantity).toLocaleString()}
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                        {cart.length > 0 && (
                            <div className="cart-summary">
                                <div className="summary-row">
                                    <span>Subtotal ({cart.reduce((s, i) => s + i.quantity, 0)} items)</span>
                                    <span>${total.toLocaleString()}</span>
                                </div>
                                <div className="summary-total">
                                    <span>Total</span>
                                    <span>${total.toLocaleString()}</span>
                                </div>
                                <button className="btn-checkout" onClick={onCheckout}>
                                    Proceed to Checkout →
                                </button>
                            </div>
                        )}
                    </div>
                </>
            );
        }

        function Checkout({ cart, total, onBack, onSubmit }) {
            const [form, setForm] = useState({
                employeeName: '',
                locationCostCenter: '',
                dateNeeded: '',
                shipToAddress: '',
                specialInstructions: ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(form);
            };

            return (
                <>
                    <header className="header">
                        <div className="header-content">
                            <div className="logo-section">
                                <h1>FPG Equipment Ordering</h1>
                                <p>Foundation Partners Group</p>
                            </div>
                        </div>
                    </header>
                    <div className="container checkout-container">
                        <button className="btn-back" onClick={onBack}>← Back to Cart</button>
                        <div className="checkout-card">
                            <div className="checkout-header">
                                <h2>Checkout</h2>
                                <p style={{ color: 'var(--text-light)' }}>Complete your equipment order</p>
                            </div>
                            <form onSubmit={handleSubmit}>
                                <div className="form-group">
                                    <label className="form-label">Employee Name *</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        placeholder="Name of employee receiving equipment"
                                        value={form.employeeName}
                                        onChange={(e) => setForm({ ...form, employeeName: e.target.value })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Location / Cost Center *</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        placeholder="e.g., Orlando - IT Department"
                                        value={form.locationCostCenter}
                                        onChange={(e) => setForm({ ...form, locationCostCenter: e.target.value })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Date Needed *</label>
                                    <input
                                        type="date"
                                        className="form-input"
                                        value={form.dateNeeded}
                                        onChange={(e) => setForm({ ...form, dateNeeded: e.target.value })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Ship To Address *</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        placeholder="Full shipping address"
                                        value={form.shipToAddress}
                                        onChange={(e) => setForm({ ...form, shipToAddress: e.target.value })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Special Instructions</label>
                                    <textarea
                                        className="form-textarea"
                                        placeholder="Any special requirements or notes..."
                                        value={form.specialInstructions}
                                        onChange={(e) => setForm({ ...form, specialInstructions: e.target.value })}
                                    />
                                </div>

                                <div className="cart-summary" style={{ marginTop: '2rem' }}>
                                    <div className="summary-row">
                                        <span>Total Items</span>
                                        <span>{cart.reduce((s, i) => s + i.quantity, 0)}</span>
                                    </div>
                                    <div className="summary-total">
                                        <span>Total Cost</span>
                                        <span>${total.toLocaleString()}</span>
                                    </div>
                                </div>

                                <button type="submit" className="btn-submit">
                                    Submit Order →
                                </button>
                            </form>
                        </div>
                    </div>
                </>
            );
        }

        function Success({ orderNum, onContinue }) {
            return (
                <>
                    <header className="header">
                        <div className="header-content">
                            <div className="logo-section">
                                <h1>FPG Equipment Ordering</h1>
                                <p>Foundation Partners Group</p>
                            </div>
                        </div>
                    </header>
                    <div className="success-container">
                        <div className="success-card">
                            <div className="success-icon">✅</div>
                            <h2 className="success-title">Order Submitted Successfully!</h2>
                            <div className="order-number">Order #{orderNum}</div>
                            <div className="success-message">
                                Your equipment order has been submitted and sent to IT.<br />
                                You will receive a confirmation email shortly at<br />
                                <strong>ithelp@foundationpartners.com</strong>
                            </div>
                            <button className="btn-continue" onClick={onContinue}>
                                ← Back to Catalog
                            </button>
                        </div>
                    </div>
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
