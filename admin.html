<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPG Equipment Admin</title>

    <!-- React + Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Admin styles -->
    <link rel="stylesheet" href="admin/css/admin.css">
</head>
<body>
    <div id="root"></div>

    <!-- ── Configuration ──────────────────────────────── -->
    <script src="admin/js/config.js"></script>

    <!-- ── Services ───────────────────────────────────── -->
    <script type="text/babel" src="admin/js/services.js"></script>

    <!-- ── Shared components ──────────────────────────── -->
    <script type="text/babel" src="admin/js/Modals.jsx"></script>

    <!-- ── Feature components (one file = one page) ───── -->
    <script type="text/babel" src="admin/js/Products.jsx"></script>
    <script type="text/babel" src="admin/js/Admins.jsx"></script>
    <script type="text/babel" src="admin/js/Categories.jsx"></script>
    <script type="text/babel" src="admin/js/Orders.jsx"></script>
    <script type="text/babel" src="admin/js/AuditLog.jsx"></script>
    <script type="text/babel" src="admin/js/VersionControl.jsx"></script>

    <!-- ── App shell and routing ──────────────────────── -->
    <script type="text/babel" src="admin/js/AdminDashboard.jsx"></script>
    <script type="text/babel" src="admin/js/App.jsx"></script>

    <!-- ── Entry point ────────────────────────────────── -->
    <script type="text/babel" src="admin/js/main.jsx"></script>
</body>
</html>
