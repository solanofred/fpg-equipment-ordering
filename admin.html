                        <div className="modal-footer">
                            <button type="button" className="btn-secondary" onClick={onClose}>
                                Close
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function ProductModal({ product, onSave, onClose, categories, onCategoryAdded, onCategoryRemoved, session, azureUrl }) {
            const [showNewCategory, setShowNewCategory] = React.useState(false);
            const [newCategoryInput, setNewCategoryInput] = React.useState('');
            const [savingCategory, setSavingCategory] = React.useState(false);
            const [categoryMessage, setCategoryMessage] = React.useState(null);

            const handleSaveNewCategory = async () => {
                const slug = newCategoryInput.trim().toLowerCase().split(' ').join('_').replace(/[^a-z0-9_]/g, '');
                if (!slug) return;
                setSavingCategory(true);
                setCategoryMessage(null);
                try {
                    await onCategoryAdded(slug, newCategoryInput.trim());
                    setFormData({ ...formData, category: slug });
                    setShowNewCategory(false);
                    setNewCategoryInput('');
                    setCategoryMessage({ type: 'success', text: 'Category added!' });
                } catch(e) {
                    setCategoryMessage({ type: 'error', text: 'Could not save: ' + e.message });
                } finally { setSavingCategory(false); }
            };

            const handleRemoveCategory = async () => {
                if (!formData.category) return;
                setSavingCategory(true);
                setCategoryMessage(null);
                try {
                    const res = await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'remove-category', slug: formData.category })
                    });
                    const text = await res.text();
                    const data = JSON.parse(text);
                    if (!res.ok) {
                        setCategoryMessage({ type: 'error', text: data.message });
                    } else {
                        onCategoryRemoved(formData.category);
                        setCategoryMessage({ type: 'success', text: 'Category removed!' });
                    }
                } catch(e) {
                    setCategoryMessage({ type: 'error', text: 'Error: ' + e.message });
                } finally { setSavingCategory(false); }
            };
            const [formData, setFormData] = useState({ ...product, imageUrl: product.imageUrl || '' });
            const [customMarkup, setCustomMarkup] = useState('');
            
            // Calculate items subtotal
            const itemsSubtotal = formData.items.reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
            const totalPrice = parseFloat(formData.price) || 0;
            const isUnderpriced = totalPrice < itemsSubtotal;
            const hasMarkup = totalPrice > itemsSubtotal;
            
            const applyMarkup = (percentage) => {
                const markup = itemsSubtotal * (percentage / 100);
                const newTotal = itemsSubtotal + markup;
                setFormData({ ...formData, price: Math.round(newTotal * 100) / 100 });
            };
            
            const applyCustomMarkup = () => {
                const percentage = parseFloat(customMarkup);
                if (!isNaN(percentage) && percentage >= 0) {
                    applyMarkup(percentage);
                    setCustomMarkup('');
                }
            };
            
            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
            };
            
            const addItem = () => {
                setFormData({
                    ...formData,
                    items: [...formData.items, { name: '', price: 0 }]
                });
            };
            
            const removeItem = (index) => {
                setFormData({
                    ...formData,
                    items: formData.items.filter((_, i) => i !== index)
                });
            };
            
            const updateItem = (index, field, value) => {
                const items = [...formData.items];
                items[index][field] = field === 'price' ? parseFloat(value) || 0 : value;
                setFormData({ ...formData, items });
            };
            
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2>{product.id ? 'Edit Product' : 'Add New Product'}</h2>
                            <button className="btn-close" onClick={onClose}>×</button>
                        </div>
                        
                        <form onSubmit={handleSubmit}>
                            <div className="modal-content">
                                <div className="form-group">
                                    <label className="form-label">Product Title *</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        value={formData.title}
                                        onChange={(e) => setFormData({ ...formData, title: e.target.value })}
                                        required
                                    />
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">Primary Category *</label>
                                    <select
                                        className="form-input"
                                        value={formData.category}
                                        onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                        required
                                    >
                                        {(categories || []).slice().sort((a, b) => a.label.localeCompare(b.label)).map(cat => (
                                            <option key={cat.slug} value={cat.slug}>{cat.label}</option>
                                        ))}
                                    </select>
                                    <div style={{fontSize:'0.8rem',color:'var(--fpg-gray)',marginTop:'0.3rem'}}>Manage categories in the Categories tab</div>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Also Appears In</label>
                                    <div style={{display:'flex',flexWrap:'wrap',gap:'0.5rem',padding:'0.75rem',border:'1px solid #d1d5db',borderRadius:'8px',background:'#f9fafb'}}>
                                        {(categories || []).slice().sort((a, b) => a.label.localeCompare(b.label))
                                            .filter(cat => cat.slug !== formData.category)
                                            .map(cat => {
                                                const checked = Array.isArray(formData.categories) && formData.categories.includes(cat.slug);
                                                return (
                                                    <label key={cat.slug} style={{display:'flex',alignItems:'center',gap:'0.4rem',cursor:'pointer',padding:'0.35rem 0.75rem',borderRadius:'20px',background:checked?'#E6F1FB':'white',border:checked?'1.5px solid #4C3BAF':'1.5px solid #d1d5db',fontSize:'0.875rem',fontWeight:checked?600:400,color:checked?'#0C447C':'#374151',transition:'all 0.15s'}}>
                                                        <input
                                                            type="checkbox"
                                                            checked={checked}
                                                            style={{display:'none'}}
                                                            onChange={(e) => {
                                                                const current = Array.isArray(formData.categories) ? formData.categories : [];
                                                                const updated = e.target.checked
                                                                    ? [...current, cat.slug]
                                                                    : current.filter(s => s !== cat.slug);
                                                                setFormData({ ...formData, categories: updated });
                                                            }}
                                                        />
                                                        {checked ? '✓ ' : ''}{cat.label}
                                                    </label>
                                                );
                                            })
                                        }
                                    </div>
                                    <div style={{fontSize:'0.8rem',color:'var(--fpg-gray)',marginTop:'0.3rem'}}>Select additional categories this product should appear in</div>
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">Image URL (optional)</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        placeholder="https://example.com/image.jpg"
                                        value={formData.imageUrl || ''}
                                        onChange={(e) => setFormData({ ...formData, imageUrl: e.target.value })}
                                    />
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">
                                        <input
                                            type="checkbox"
                                            checked={formData.recommended}
                                            onChange={(e) => setFormData({ ...formData, recommended: e.target.checked })}
                                            style={{ marginRight: '0.5rem' }}
                                        />
                                        Mark as Recommended
                                    </label>
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">Items Included</label>
                                    <div className="items-list">
                                        {formData.items.map((item, index) => (
                                            <div key={index} className="item-row">
                                                <input
                                                    type="text"
                                                    className="form-input"
                                                    placeholder="Item name"
                                                    value={item.name}
                                                    onChange={(e) => updateItem(index, 'name', e.target.value)}
                                                    required
                                                />
                                                <input
                                                    type="number"
                                                    className="form-input"
                                                    placeholder="Price"
                                                    value={item.price}
                                                    onChange={(e) => updateItem(index, 'price', e.target.value)}
                                                    min="0"
                                                    step="0.01"
                                                    required
                                                    style={{ width: '150px' }}
                                                />
                                                <button
                                                    type="button"
                                                    className="btn-remove-item"
                                                    onClick={() => removeItem(index)}
                                                >
                                                    ×
                                                </button>
                                            </div>
                                        ))}
                                        <button
                                            type="button"
                                            className="btn-add-item"
                                            onClick={addItem}
                                        >
                                            + Add Item
                                        </button>
                                        
                                        {formData.items.length > 0 && (
                                            <div className="price-calculator">
                                                <div className="price-calc-row">
                                                    <span style={{ color: 'var(--fpg-gray)' }}>Items Subtotal:</span>
                                                    <span style={{ fontWeight: '600' }}>${itemsSubtotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                                </div>
                                                
                                                <div className="markup-section">
                                                    <label className="markup-label">Apply Markup:</label>
                                                    <div className="markup-buttons">
                                                        <button
                                                            type="button"
                                                            className="btn-markup"
                                                            onClick={() => applyMarkup(10)}
                                                        >
                                                            +10%
                                                        </button>
                                                        <button
                                                            type="button"
                                                            className="btn-markup"
                                                            onClick={() => applyMarkup(15)}
                                                        >
                                                            +15%
                                                        </button>
                                                        <button
                                                            type="button"
                                                            className="btn-markup"
                                                            onClick={() => applyMarkup(20)}
                                                        >
                                                            +20%
                                                        </button>
                                                    </div>
                                                    <div className="custom-markup">
                                                        <span style={{ fontSize: '0.9rem', color: 'var(--fpg-gray)' }}>Custom:</span>
                                                        <input
                                                            type="number"
                                                            className="custom-markup-input"
                                                            placeholder="0"
                                                            value={customMarkup}
                                                            onChange={(e) => setCustomMarkup(e.target.value)}
                                                            onKeyPress={(e) => {
                                                                if (e.key === 'Enter') {
                                                                    e.preventDefault();
                                                                    applyCustomMarkup();
                                                                }
                                                            }}
                                                            min="0"
                                                            step="0.1"
                                                        />
                                                        <span style={{ fontSize: '0.9rem' }}>%</span>
                                                        <button
                                                            type="button"
                                                            className="btn-apply-custom"
                                                            onClick={applyCustomMarkup}
                                                        >
                                                            Apply
                                                        </button>
                                                    </div>
                                                </div>
                                                
                                                <div className="price-calc-total">
                                                    <span>Total Package Price:</span>
                                                    <span style={{ color: 'var(--primary)' }}>${totalPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                                </div>
                                                
                                                {isUnderpriced && (
                                                    <div className="price-warning">
                                                        <span style={{ fontSize: '1.25rem' }}>⚠️</span>
                                                        <div>
                                                            <strong>Warning: Total price is LESS than items subtotal!</strong>
                                                            <br />
                                                            You're underpricing by ${(itemsSubtotal - totalPrice).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {hasMarkup && !isUnderpriced && (
                                                    <div className="price-good">
                                                        <span style={{ fontSize: '1.25rem' }}>✓</span>
                                                        <div>
                                                            Markup: ${(totalPrice - itemsSubtotal).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} 
                                                            ({Math.round(((totalPrice - itemsSubtotal) / itemsSubtotal) * 100)}%)
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {totalPrice === itemsSubtotal && totalPrice > 0 && (
                                                    <div className="price-good">
                                                        <span style={{ fontSize: '1.25rem' }}>✓</span>
                                                        <div>Total matches items exactly (no markup)</div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">Total Price * (can be manually overridden)</label>
                                    <input
                                        type="number"
                                        className="form-input"
                                        value={formData.price}
                                        onChange={(e) => setFormData({ ...formData, price: parseFloat(e.target.value) || 0 })}
                                        min="0"
                                        step="0.01"
                                        required
                                        style={{ fontSize: '1.1rem', fontWeight: '600', color: 'var(--primary)' }}
                                    />
                                    <small style={{ color: 'var(--fpg-gray)', fontSize: '0.85rem', display: 'block', marginTop: '0.5rem' }}>
                                        💡 Use markup buttons above or type manually to adjust for state-specific pricing
                                    </small>
                                </div>
                            </div>
                            
                            <div className="modal-footer">
                                <button type="button" className="btn-secondary" onClick={onClose}>
                                    Cancel
                                </button>
                                <button type="submit" className="btn-save">
                                    Save Product
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function AccessManagement({ session, azureUrl, adminPortalUrl }) {
            const [admins, setAdmins] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [newName, setNewName] = React.useState('');
            const [newEmail, setNewEmail] = React.useState('');
            const [adding, setAdding] = React.useState(false);
            const [status, setStatus] = React.useState(null);

            const callApi = async (action, extra = {}) => {
                const res = await fetch(azureUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                    body: JSON.stringify({ action, ...extra })
                });
                const text = await res.text();
                if (!text || text.trim() === '') throw new Error('Azure Function returned empty response.');
                const data = JSON.parse(text);
                if (!res.ok) throw new Error(data.message || 'Request failed');
                return data;
            };

            const loadAdmins = async () => {
                try {
                    setLoading(true);
                    let adminList = [];
                    try {
                        const data = await callApi('get-admins');
                        adminList = data.admins || [];
                    } catch(e) {
                        const res = await fetch('./admins.json');
                        if (res.ok) adminList = await res.json();
                        else throw new Error('Could not load admins');
                    }
                    setAdmins(adminList);
                } catch(e) {
                    setStatus({ type: 'error', message: 'Could not load admins: ' + e.message });
                } finally { setLoading(false); }
            };

            React.useEffect(() => { loadAdmins(); }, []);

            const handleAdd = async () => {
                if (!newName.trim() || !newEmail.trim()) { setStatus({ type: 'error', message: 'Please enter both name and email.' }); return; }
                if (!newEmail.includes('@')) { setStatus({ type: 'error', message: 'Please enter a valid email.' }); return; }
                setAdding(true); setStatus(null);
                try {
                    const data = await callApi('add-admin', { newAdminEmail: newEmail, newAdminName: newName });
                    setAdmins(data.admins);
                    setStatus({ type: 'success', message: newName + ' has been added!' });
                    const subject = encodeURIComponent('Equipment Admin Access Approved by Fred Solano');
                    const body = encodeURIComponent('Hi ' + newName + ',\n\nYou have been granted access to the FPG Equipment Ordering Admin Portal.\n\nAccess it here:\n' + adminPortalUrl + '\n\nLog in using: ' + newEmail.toLowerCase().trim() + '\n\nBest regards,\nFPG IT Team');
                    const a = document.createElement('a'); a.href = 'mailto:' + newEmail + '?subject=' + subject + '&body=' + body;
                    a.style.display = 'none'; document.body.appendChild(a); a.click(); setTimeout(() => document.body.removeChild(a), 100);
                    setNewName(''); setNewEmail('');
                } catch(e) { setStatus({ type: 'error', message: e.message }); }
                finally { setAdding(false); }
            };

            const handleRemove = async (email, name) => {
                if (!confirm('Remove ' + name + ' from admin access?')) return;
                setStatus(null);
                try {
                    const data = await callApi('remove-admin', { removeEmail: email });
                    setAdmins(data.admins);
                    setStatus({ type: 'success', message: name + ' has been removed.' });
                } catch(e) { setStatus({ type: 'error', message: e.message }); }
            };

            const handleToggleRole = async (email, name, currentRole) => {
                const newRole = currentRole === 'superadmin' ? 'admin' : 'superadmin';
                const action = newRole === 'superadmin' ? 'Grant superadmin to' : 'Demote to admin';
                if (!confirm(action + ' ' + name + '?')) return;
                setStatus(null);
                try {
                    const data = await callApi('update-admin-role', { targetEmail: email, newRole });
                    setAdmins(data.admins);
                    setStatus({ type: 'success', message: name + ' is now ' + newRole + '.' });
                } catch(e) { setStatus({ type: 'error', message: e.message }); }
            };

            const getInitials = (name) => name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
            const formatDate = (iso) => iso ? new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';

            return (
                <div style={{maxWidth:'760px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                        <div>
                            <span style={{fontSize:'16px',fontWeight:700,color:'#0F172A'}}>Current Admins</span>
                            <span style={{fontSize:'13px',fontWeight:400,color:'#64748B',marginLeft:'8px'}}>{loading ? 'Loading...' : admins.length + ' authorized user' + (admins.length !== 1 ? 's' : '')}</span>
                        </div>
                    </div>
                    <div style={{background:'white',borderRadius:'12px',border:'0.5px solid #E2E8F0',marginBottom:'24px',overflow:'hidden'}}>
                        {status && (
                            <div style={{margin:'0 0 12px',padding:'10px 14px',borderRadius:'8px',fontSize:'13px',background:status.type==='success'?'#DCFCE7':'#FEE2E2',color:status.type==='success'?'#166534':'#991B1B',border:status.type==='success'?'1px solid #86EFAC':'1px solid #FECACA'}}>
                                {status.type === 'success' ? '✅' : '❌'} {status.message}
                            </div>
                        )}
                        <div>
                            {loading ? <div style={{padding:'2rem',textAlign:'center',color:'#666'}}>Loading admins...</div> :
                            admins.map((admin, i) => {
                                const isYou = admin.email.toLowerCase() === session.email.toLowerCase();
                                const adminIsSuperAdmin = admin.role === 'superadmin';
                                return (
                                    <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:'0.5px solid #F1F5F9'}}>
                                        <div style={{display:'flex',alignItems:'center',gap:'0.875rem'}}>
                                            <div style={{width:'40px',height:'40px',background:'linear-gradient(135deg,#4C3BAF,#1E3A5F)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:'0.9rem',flexShrink:0}}>{getInitials(admin.name)}</div>
                                            <div>
                                                <div style={{fontWeight:600,fontSize:'0.95rem',display:'flex',alignItems:'center',gap:'6px'}}>
                                                    {admin.name}
                                                    {isYou && <span style={{background:'#DBEAFE',color:'#1E40AF',padding:'0.2rem 0.6rem',borderRadius:'20px',fontSize:'0.75rem',fontWeight:600}}>You</span>}
                                                    <span style={{
                                                        background: adminIsSuperAdmin ? '#FEF3C7' : '#F1F5F9',
                                                        color: adminIsSuperAdmin ? '#92400E' : '#475569',
                                                        padding:'0.15rem 0.5rem',borderRadius:'20px',fontSize:'0.7rem',fontWeight:600
                                                    }}>{adminIsSuperAdmin ? '⭐ Superadmin' : 'Admin'}</span>
                                                </div>
                                                <div style={{fontSize:'0.8rem',color:'#666'}}>{admin.email}</div>
                                                {admin.addedAt && admin.addedBy !== 'system' && <div style={{fontSize:'0.75rem',color:'#999',marginTop:'0.1rem'}}>Added by {admin.addedBy} · {formatDate(admin.addedAt)}</div>}
                                            </div>
                                        </div>

        function CategoryManagement({ session, azureUrl, categories, products, onCategoryAdded, onCategoryUpdated, onCategoryRemoved }) {
            const [newCatName, setNewCatName] = React.useState('');
            const [newCatImageUrl, setNewCatImageUrl] = React.useState('');
            const [saving, setSaving] = React.useState(false);
            const [status, setStatus] = React.useState(null);
            const [editingSlug, setEditingSlug] = React.useState(null);
            const [editLabel, setEditLabel] = React.useState('');
            const [editImageUrl, setEditImageUrl] = React.useState('');
            const [showAddModal, setShowAddModal] = React.useState(false);
            const getProductCount = function(slug) {
                if (slug === 'all') return (products || []).length;
                if (slug === 'recommended') return (products || []).filter(function(p) { return p.recommended; }).length;
                return (products || []).filter(function(p) { return p.category === slug; }).length;
            };

            const handleAdd = async function() {
                if (!newCatName.trim()) return;
                const slug = newCatName.trim().toLowerCase().split(' ').join('_').replace(/[^a-z0-9_]/g, '');
                const label = newCatName.trim();
                const imageUrl = newCatImageUrl.trim();
                setSaving(true);
                setStatus(null);
                // Update UI instantly
                onCategoryAdded(slug, label);
                setNewCatName('');
                setNewCatImageUrl('');
                setStatus({ type: 'success', text: label + ' added successfully!' });
                setSaving(false);
                // Sync to GitHub in background
                try {
                    const res = await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'add-category', slug: slug, label: label, imageUrl: imageUrl })
                    });
                    const text = await res.text();
                    if (!text) throw new Error('Empty response');
                    const data = JSON.parse(text);
                    if (!res.ok) {
                        onCategoryRemoved(slug); // revert
                        setStatus({ type: 'error', text: data.message || 'Failed to save' });
                    }
                } catch(e) {
                    onCategoryRemoved(slug); // revert
                    setStatus({ type: 'error', text: e.message });
                }
            };

            const handleRemove = async function(slug, label) {
                if (!confirm('Remove category "' + label + '"? This cannot be undone.')) return;
                setSaving(true);
                setStatus(null);
                // Update UI instantly
                onCategoryRemoved(slug);
                setStatus({ type: 'success', text: label + ' removed.' });
                setSaving(false);
                // Sync to GitHub in background
                try {
                    const res = await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'remove-category', slug: slug })
                    });
                    const text = await res.text();
                    if (!text) throw new Error('Empty response');
                    const data = JSON.parse(text);
                    if (!res.ok) {
                        onCategoryUpdated(slug, label); // revert UI only
                        setStatus({ type: 'error', text: data.message || 'Failed to remove' });
                    }
                } catch(e) {
                    onCategoryUpdated(slug, label); // revert UI only
                    setStatus({ type: 'error', text: e.message });
                }
            };

            const handleStartEdit = function(cat) {
                setEditingSlug(cat.slug);
                setEditLabel(cat.label);
                setEditImageUrl(cat.imageUrl || '');
                setStatus(null);
            };

            const handleCancelEdit = function() {
                setEditingSlug(null);
                setEditLabel('');
                setEditImageUrl('');
            };

            const handleSaveEdit = async function(slug) {
                if (!editLabel.trim()) return;
                setSaving(true);
                setStatus(null);
                const newLabel = editLabel.trim();
                const newImageUrl = editImageUrl.trim();
                const oldLabel = (categories||[]).find(c => c.slug === slug)?.label || slug;
                const labelChanged = newLabel !== oldLabel;
                const imageChanged = newImageUrl !== ((categories||[]).find(c => c.slug === slug)?.imageUrl || '');
                let successText = '';
                if (labelChanged && imageChanged) successText = 'Category updated — name and image saved.';
                else if (labelChanged) successText = 'Category renamed to "' + newLabel + '".';
                else if (imageChanged) successText = 'Image updated for "' + newLabel + '".';
                else successText = '"' + newLabel + '" saved.';
                // Update UI instantly — use onCategoryUpdated (UI only, no API call)
                onCategoryUpdated(slug, newLabel);
                setStatus({ type: 'success', text: successText });
                setEditingSlug(null);
                setEditLabel('');
                setEditImageUrl('');
                setSaving(false);
                // Sync to GitHub in background
                try {
                    const res = await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'rename-category', slug: slug, newLabel: newLabel, imageUrl: newImageUrl })
                    });
                    const text = await res.text();
                    if (!text) throw new Error('Empty response');
                    const data = JSON.parse(text);
                    if (!res.ok) {
                        onCategoryUpdated(slug, oldLabel); // revert UI only
                        setStatus({ type: 'error', text: data.message || 'Failed to rename' });
                    }
                } catch(e) {
                    onCategoryUpdated(slug, oldLabel); // revert UI only
                    setStatus({ type: 'error', text: e.message });
                }
            };

            return (
                <div>
                    {showAddModal && (
                        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={function(e){if(e.target===e.currentTarget){setShowAddModal(false);setNewCatName("");}}}>
                            <div style={{background:'white',borderRadius:'12px',padding:'1.5rem',width:'420px',maxWidth:'90vw',boxShadow:'0 8px 32px rgba(0,0,0,0.18)'}}>
                                <h3 style={{fontSize:'1.1rem',fontWeight:600,margin:'0 0 1rem'}}>New category</h3>
                                <input
                                    type="text"
                                    placeholder="e.g. Headsets"
                                    value={newCatName}
                                    onChange={function(e){setNewCatName(e.target.value);}}
                                    onKeyDown={function(e){if(e.key==='Enter') handleAdd();if(e.key==='Escape'){setShowAddModal(false);setNewCatName('');setNewCatImageUrl('');}}}
                                    autoFocus
                                    style={{width:'100%',padding:'0.75rem 1rem',border:'1px solid #d1d5db',borderRadius:'8px',fontSize:'0.95rem',outline:'none',boxSizing:'border-box',marginBottom:'0.75rem'}}
                                />
                                <input
                                    type="text"
                                    placeholder="Image URL (optional) — https://..."
                                    value={newCatImageUrl}
                                    onChange={function(e){setNewCatImageUrl(e.target.value);}}
                                    style={{width:'100%',padding:'0.75rem 1rem',border:'1px solid #d1d5db',borderRadius:'8px',fontSize:'0.95rem',outline:'none',boxSizing:'border-box',marginBottom:'1rem'}}
                                />
                                {newCatImageUrl.trim() && (
                                    <div style={{marginBottom:'1rem',display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.5rem',background:'#f9fafb',borderRadius:'8px'}}>
                                        <img src={newCatImageUrl.trim()} alt="preview" style={{width:'48px',height:'48px',objectFit:'cover',borderRadius:'8px',border:'1px solid #e5e7eb'}} onError={function(e){e.target.style.display='none';}} />
                                        <span style={{fontSize:'0.8rem',color:'#6b7280'}}>Image preview</span>
                                    </div>
                                )}
                                {status && showAddModal && (
                                    <div style={{marginBottom:'1rem',padding:'0.75rem 1rem',borderRadius:'8px',fontSize:'0.875rem',background:status.type==='success'?'#D1FAE5':'#FEE2E2',color:status.type==='success'?'#065F46':'#991B1B'}}>
                                        {status.type === 'success' ? '✅' : '❌'} {status.text}
                                    </div>
                                )}
                                <div style={{display:'flex',gap:'0.75rem',justifyContent:'flex-end'}}>
                                    <button onClick={function(){setShowAddModal(false);setNewCatName('');setNewCatImageUrl('');setStatus(null);}} style={{padding:'0.6rem 1.25rem',borderRadius:'8px',border:'1px solid #d1d5db',background:'white',fontSize:'0.95rem',cursor:'pointer'}}>Cancel</button>
                                    <button onClick={function(){handleAdd();setTimeout(function(){setShowAddModal(false);},300);}} disabled={saving || !newCatName.trim()} className="btn btn-primary" style={{whiteSpace:'nowrap'}}>
                                        {saving ? 'Saving...' : 'Add category'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
                            <div>
                                <span style={{fontSize:'15px',fontWeight:700,color:'#0F172A'}}>Categories</span>
                                <span style={{fontSize:'13px',fontWeight:400,color:'#64748B',marginLeft:'8px'}}>{(categories||[]).length} total · {(categories||[]).filter(function(c){return getProductCount(c.slug)===0;}).length} empty</span>
                            </div>
                            <button onClick={function(){setShowAddModal(true);setStatus(null);}} style={{padding:'8px 18px',background:'#4C3BAF',border:'none',borderRadius:'8px',fontSize:'12px',fontWeight:700,color:'white',cursor:'pointer'}}>
                                + New category
                            </button>
                        </div>

                        {status && !showAddModal && (
                            <div style={{padding:'10px 14px',borderRadius:'8px',fontSize:'13px',marginBottom:'14px',background:status.type==='success'?'#DCFCE7':'#FEE2E2',color:status.type==='success'?'#166534':'#991B1B',border:status.type==='success'?'1px solid #86EFAC':'1px solid #FECACA'}}>
                                {status.type === 'success' ? '✅' : '❌'} {status.text}
                            </div>
                        )}

                        <div style={{background:'white',borderRadius:'12px',border:'0.5px solid #E2E8F0',overflow:'hidden',maxWidth:'1200px'}}>
                            <table id="tbl-categories" className="resizable-table" style={{tableLayout:'fixed',width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                                <thead>
                                    <tr style={{background:'#D97706'}}>
                                        <th style={{padding:'11px 16px',textAlign:'left',color:'white',fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',width:'42%'}}>Category</th>
                                        <th style={{padding:'11px 16px',textAlign:'left',color:'white',fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',width:'14%'}}>Products</th>
                                        <th style={{padding:'11px 16px',textAlign:'left',color:'white',fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',width:'14%'}}>Status</th>
                                        <th style={{padding:'11px 16px',textAlign:'right',color:'white',fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em'}}>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(categories || []).slice().sort((a,b) => a.label.localeCompare(b.label)).map(function(cat, i) {
                                        const count = getProductCount(cat.slug);
                                        const isEmpty = count === 0;
                                        const isEditing = editingSlug === cat.slug;
                                        return (
                                            <tr key={i} style={{background:i%2===0?'white':'#F9FAFB',borderBottom:'1px solid #F1F5F9'}}>
                                                <td style={{padding:'11px 16px'}}>
                                                    {isEditing ? (
                                                        <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                                                            <input type="text" value={editLabel} onChange={function(e){setEditLabel(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter') handleSaveEdit(cat.slug); if(e.key==='Escape') handleCancelEdit();}} autoFocus placeholder="Category name" style={{padding:'7px 10px',border:'2px solid #4C3BAF',borderRadius:'7px',fontSize:'13px',outline:'none',width:'280px'}} />
                                                            <input type="text" value={editImageUrl} onChange={function(e){setEditImageUrl(e.target.value);}} placeholder="Image URL (optional)" style={{padding:'7px 10px',border:'1.5px solid #E2E8F0',borderRadius:'7px',fontSize:'12px',outline:'none',width:'280px'}} />
                                                        </div>
                                                    ) : (
                                                        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                                                            <div style={{width:'44px',height:'44px',borderRadius:'8px',overflow:'hidden',flexShrink:0,background:'#F5F3FF',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #EDE9FE'}}>
                                                                {cat.imageUrl
                                                                    ? <img src={cat.imageUrl} alt={cat.label} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={function(e){e.target.style.display='none';e.target.parentNode.style.display='flex';e.target.parentNode.innerHTML='<i class="ti ti-tag" style="font-size:20px;color:#6366F1"></i>';}} />
                                                                    : <i className="ti ti-tag" style={{fontSize:'20px',color:'#6366F1'}}></i>}
                                                            </div>
                                                            <div style={{fontWeight:600,color:'#0F172A',fontSize:'13px'}}>{cat.label}</div>
                                                        </div>
                                                    )}
                                                </td>
                                                <td style={{padding:'11px 16px',color:'#475569',fontSize:'12.5px'}}>{count} product{count!==1?'s':''}</td>
                                                <td style={{padding:'11px 16px'}}>
                                                    {!isEmpty && <span style={{background:'#EDE9FE',color:'#4C3BAF',padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:700}}>In use</span>}
                                                </td>
                                                <td style={{padding:'11px 16px',textAlign:'right'}}>
                                                    {isEditing ? (
                                                        <div style={{display:'flex',gap:'6px',justifyContent:'flex-end'}}>
                                                            <button onClick={function(){handleSaveEdit(cat.slug);}} disabled={saving||!editLabel.trim()} style={{padding:'5px 14px',background:'#4C3BAF',border:'none',color:'white',borderRadius:'7px',fontSize:'11.5px',fontWeight:700,cursor:'pointer'}}>{saving?'Saving...':'Save'}</button>
                                                            <button onClick={handleCancelEdit} disabled={saving} style={{padding:'5px 14px',border:'1.5px solid #E2E8F0',borderRadius:'7px',fontSize:'11.5px',background:'white',color:'#64748B',cursor:'pointer'}}>Cancel</button>
                                                        </div>
                                                    ) : (
                                                        <div style={{display:'flex',gap:'6px',justifyContent:'flex-end'}}>
                                                            <button onClick={function(){handleStartEdit(cat);}} disabled={saving} style={{padding:'5px 14px',border:'1.5px solid #E2E8F0',borderRadius:'7px',fontSize:'11.5px',fontWeight:600,background:'white',color:'#1E3A5F',cursor:'pointer'}}>Edit</button>
                                                            <button onClick={function(){handleRemove(cat.slug,cat.label);}} disabled={saving} style={{padding:'5px 14px',border:'1.5px solid #FCA5A5',borderRadius:'7px',fontSize:'11.5px',fontWeight:600,background:'white',color:'#DC2626',cursor:'pointer'}}>Remove</button>
                                                        </div>
                                                    )}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                                        </div>
                </div>
            );
        }

        // ─── ORDERS DASHBOARD ────────────────────────────────────────────
        function OrdersDashboard({ session, azureUrl, onNavigate }) {
            const [orders, setOrders] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [searchQuery, setSearchQuery] = React.useState('');
            const [statusFilter, setStatusFilter] = React.useState('all');
            const [submitterFilter, setSubmitterFilter] = React.useState('all');
            const [locationFilter, setLocationFilter] = React.useState('all');
            const [dateFrom, setDateFrom] = React.useState('');
            const [dateTo, setDateTo] = React.useState('');
            const [minTotal, setMinTotal] = React.useState('');
            const [maxTotal, setMaxTotal] = React.useState('');
            const [yearFilter, setYearFilter] = React.useState([new Date().getFullYear()]);
            const [sortCol, setSortCol] = React.useState('submittedAt');
            const [sortDir, setSortDir] = React.useState('desc');
            const [pageSize, setPageSize] = React.useState(25);
            const [currentPage, setCurrentPage] = React.useState(1);
            const [showDeleted, setShowDeleted] = React.useState(false);
            const [drilldown, setDrilldown] = React.useState(null);
            const [deleteModal, setDeleteModal] = React.useState(null);
            const [deleteReason, setDeleteReason] = React.useState('');
            const [restoreModal, setRestoreModal] = React.useState(null);
            const [permDeleteModal, setPermDeleteModal] = React.useState(null);
            const [permDeleteReason, setPermDeleteReason] = React.useState('');
            const [showExportMenu, setShowExportMenu] = React.useState(false);
            const [auditTypeFilter, setAuditTypeFilter] = React.useState('all');
            const [auditExpandedRows, setAuditExpandedRows] = React.useState({});
            const [status, setStatus] = React.useState(null);
            const [expandedRows, setExpandedRows] = React.useState({});
            const [selectedOrders, setSelectedOrders] = React.useState({});
            const isSuperAdmin = session && session.role === 'superadmin';
            const currentYear = new Date().getFullYear();
            const availableYears = [currentYear, currentYear - 1, currentYear - 2];

            React.useEffect(() => { loadOrders(); }, [yearFilter]);

            const loadOrders = async function() {
                setLoading(true);
                try {
                    const res = await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'get-orders', years: yearFilter })
                    });
                    const data = await res.json();
                    setOrders(data.orders || []);
                } catch(e) { setStatus({ type: 'error', text: 'Failed to load orders' }); }
                setLoading(false);
            };

            const loadAuditLog = function() { if (onNavigate) onNavigate('auditlog'); };

            const handleStatusChange = async function(order, newStatus) {
                try {
                    await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'update-order-status', orderId: order.id, newStatus, year: order.year })
                    });
                    setOrders(prev => prev.map(o => o.id === order.id ? { ...o, status: newStatus } : o));
                    setStatus({ type: 'success', text: `Order status updated to "${newStatus}"` });
                } catch(e) { setStatus({ type: 'error', text: 'Failed to update status' }); }
            };

            const handleSoftDelete = async function() {
                if (!deleteReason.trim()) return;
                try {
                    await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'delete-order', orderId: deleteModal.id, year: deleteModal.year, reason: deleteReason.trim() })
                    });
                    setOrders(prev => prev.map(o => o.id === deleteModal.id ? { ...o, status: 'Deleted', deletedBy: session.email, deleteReason: deleteReason.trim() } : o));
                    setStatus({ type: 'success', text: 'Order deleted' });
                } catch(e) { setStatus({ type: 'error', text: 'Failed to delete order' }); }
                setDeleteModal(null); setDeleteReason('');
            };

            const handleRestore = async function() {
                try {
                    await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'restore-order', orderId: restoreModal.id, year: restoreModal.year })
                    });
                    setOrders(prev => prev.map(o => o.id === restoreModal.id ? { ...o, status: 'New', deletedBy: undefined, deletedAt: undefined, deleteReason: undefined } : o));
                    setStatus({ type: 'success', text: 'Order restored' });
                } catch(e) { setStatus({ type: 'error', text: 'Failed to restore order' }); }
                setRestoreModal(null);
            };

            const handlePermDelete = async function() {
                if (!permDeleteReason.trim()) return;
                try {
                    await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'permanent-delete-order', orderId: permDeleteModal.id, year: permDeleteModal.year, reason: permDeleteReason.trim() })
                    });
                    setOrders(prev => prev.filter(o => o.id !== permDeleteModal.id));
                    setStatus({ type: 'success', text: 'Order permanently deleted' });
                } catch(e) { setStatus({ type: 'error', text: 'Failed to permanently delete order' }); }
                setPermDeleteModal(null); setPermDeleteReason('');
            };

            const toggleRow = function(orderId) {
                setExpandedRows(prev => ({ ...prev, [orderId]: !prev[orderId] }));
            };

            const toggleSelect = function(e, orderId) {
                e.stopPropagation();
                setSelectedOrders(prev => ({ ...prev, [orderId]: !prev[orderId] }));
            };

            const toggleSelectAll = function(e) {
                if (e.target.checked) {
                    const all = {};
                    filtered.forEach(o => { all[o.id] = true; });
                    setSelectedOrders(all);
                } else {
                    setSelectedOrders({});
                }
            };

            const exportToCSV = function(ordersToExport, filename) {
                const headers = ['Order ID','Date','Time','Submitter Name','Submitter Email','Recipient Name','Recipient Email','Location ID','Ship To','Items','Total','Status','Date Needed','Notes'];
                const rows = ordersToExport.map(o => {
                    const items = (o.items||[]).map(i => `${i.title} x${i.quantity||1} ($${(i.price||0).toFixed(2)})`).join('; ');
                    const dt = new Date(o.submittedAt);
                    return [
                        o.id,
                        dt.toLocaleDateString(),
                        dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
                        o.submitterName||'',
                        o.submitterEmail||'',
                        o.recipientName||'',
                        o.recipientEmail||'',
                        o.locationId||'',
                        `"${(o.shipTo||'').replace(/"/g,'""')}"`,
                        `"${items.replace(/"/g,'""')}"`,
                        (o.total||0).toFixed(2),
                        o.status||'',
                        o.dateNeeded||'',
                        `"${(o.notes||'').replace(/"/g,'""')}"`
                    ];
                });
                const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });

                const a = document.createElement('a');

            const handleSort = function(col) {
                if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');

            };

            // Build unique submitters and locations for dropdowns
            const uniqueSubmitters = [...new Map(orders.map(o => [o.submitterEmail, o.submitterName])).entries()].sort((a,b)=>a[1].localeCompare(b[1]));
            const uniqueLocations = [...new Set(orders.map(o => o.locationId).filter(Boolean))].sort();

            const filtered = orders.filter(o => {
                if (!showDeleted && o.status === 'Deleted') return false;
                if (statusFilter !== 'all' && o.status !== statusFilter) return false;
                if (submitterFilter !== 'all' && o.submitterEmail !== submitterFilter) return false;
                if (locationFilter !== 'all' && o.locationId !== locationFilter) return false;
                if (dateFrom) { const d = new Date(o.submittedAt); if (d < new Date(dateFrom)) return false; }
                if (dateTo) { const d = new Date(o.submittedAt); if (d > new Date(dateTo + 'T23:59:59')) return false; }
                if (minTotal && (o.total || 0) < parseFloat(minTotal)) return false;
                if (maxTotal && (o.total || 0) > parseFloat(maxTotal)) return false;
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    return (o.submitterName||'').toLowerCase().includes(q) ||
                           (o.submitterEmail||'').toLowerCase().includes(q) ||
                           (o.recipientName||'').toLowerCase().includes(q) ||
                           (o.locationId||'').toLowerCase().includes(q) ||
                           (o.shipTo||'').toLowerCase().includes(q) ||
                           (o.id||'').toLowerCase().includes(q);
                }
                return true;
            }).sort((a, b) => {
                let av = a[sortCol], bv = b[sortCol];
                if (sortCol === 'total') { av = a.total||0; bv = b.total||0; return sortDir==='asc' ? av-bv : bv-av; }
                if (sortCol === 'submittedAt') { av = new Date(a.submittedAt); bv = new Date(b.submittedAt); return sortDir==='asc' ? av-bv : bv-av; }
                av = (av||'').toString().toLowerCase(); bv = (bv||'').toString().toLowerCase();
                return sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);

        // ─── AUDIT LOG OPENER ────────────────────────────────────────────
        // Self-contained component that fires the audit log fetch on mount
        // and opens the result in a new tab, then switches back to orders.
        function AuditLogOpener({ session, azureUrl }) {
            const [status, setStatus] = React.useState('loading');
            const [entries, setEntries] = React.useState([]);
            const [filterQ, setFilterQ] = React.useState('');
            const [filterType, setFilterType] = React.useState('');
            const [filterAdmin, setFilterAdmin] = React.useState('');
            const [filterResult, setFilterResult] = React.useState('');
            const [filterFrom, setFilterFrom] = React.useState('');
            const [filterTo, setFilterTo] = React.useState('');

            React.useEffect(() => {
                (async () => {
                    try {
                        const year = new Date().getFullYear();
                        const availableYears = [year, year - 1, year - 2].filter(y => y >= 2024);
                        const yearsToLoad = [year];

                        let allEntries = [];
                        for (const y of yearsToLoad) {
                            const res = await fetch(azureUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                                body: JSON.stringify({ action: 'get-audit-log', year: y })
                            });
                            const data = await res.json();
                            if (Array.isArray(data.log)) allEntries = allEntries.concat(data.log);
                        }
                        allEntries.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

                        const actionMetaMap = {
                            'auth.login':          { label: 'Login',           bg:'#EEF2FF', color:'#4C3BAF', border:'#C7D2FE', dot:'#818CF8' },
                            'auth.logout':         { label: 'Logout',          bg:'#F1F5F9', color:'#475569', border:'#CBD5E1', dot:'#94A3B8' },
                            'auth.auto_logoff':    { label: 'Auto-logout',     bg:'#F1F5F9', color:'#475569', border:'#CBD5E1', dot:'#94A3B8' },
                            'order.soft_delete':   { label: 'Order deleted',   bg:'#FEE2E2', color:'#DC2626', border:'#FECACA', dot:'#F87171' },
                            'order.permanent_delete': { label:'Perm. deleted', bg:'#FCA5A5', color:'#7F1D1D', border:'#F87171', dot:'#EF4444' },
                            'order.permanent_delete_attempt': { label:'Perm. denied', bg:'#FCA5A5', color:'#7F1D1D', border:'#F87171', dot:'#EF4444' },
                            'order.restore':       { label: 'Restored',        bg:'#DCFCE7', color:'#166534', border:'#86EFAC', dot:'#4ADE80' },
                            'order.status_change': { label: 'Status change',   bg:'#FEF9C3', color:'#854D0E', border:'#FDE68A', dot:'#FCD34D' },
                            'access.admin_added':  { label: 'Admin added',     bg:'#DCFCE7', color:'#166534', border:'#86EFAC', dot:'#4ADE80' },
                            'access.admin_removed':{ label: 'Admin removed',   bg:'#FEE2E2', color:'#DC2626', border:'#FECACA', dot:'#F87171' },
                            'access.role_changed': { label: 'Role changed',    bg:'#FEF9C3', color:'#854D0E', border:'#FDE68A', dot:'#FCD34D' },
                            'category.added':      { label: 'Category added',  bg:'#EEF2FF', color:'#4C3BAF', border:'#C7D2FE', dot:'#818CF8' },
                            'category.updated':    { label: 'Category updated',bg:'#EEF2FF', color:'#4C3BAF', border:'#C7D2FE', dot:'#818CF8' },
                            'category.removed':    { label: 'Category removed',bg:'#FEE2E2', color:'#DC2626', border:'#FECACA', dot:'#F87171' },
                            'portal.products_published': { label: 'Published', bg:'#DCFCE7', color:'#166534', border:'#86EFAC', dot:'#4ADE80' },
                        };
                        const getMetaFn = (action) => actionMetaMap[action] || { label: action, bg:'#F1F5F9', color:'#475569', border:'#CBD5E1', dot:'#94A3B8' };

                        const typeCounts = {};

                            if (entry.detail && entry.detail.browser) detail += '<span style="color:#A8A29E">' + (entry.detail.browser||'').substring(0,70) + '</span>';
                            if (entry.detail && entry.detail.productsCount) detail += entry.detail.productsCount + ' products published';
                            const resBg = entry.result==='success' ? '#DCFCE7' : entry.result==='denied' ? '#FEE2E2' : '#F5F5F4';
                            const resColor = entry.result==='success' ? '#166534' : entry.result==='denied' ? '#991B1B' : '#78716C';
                            let snapHtml = '';
                            if (expandable && s) {
                                const items = (s.items||[]).map(it => it.title + ' x' + (it.quantity||1) + ' ($' + (((it.price||0)*(it.quantity||1)).toFixed(2)) + ')').join(', ');
                                snapHtml = '<tr class="snap" id="snap-' + i + '" style="display:none;background:#F0F4F8"><td colspan="7" style="padding:10px 14px 12px 32px"><div style="background:white;border-radius:6px;border:0.5px solid #C7D9F0;padding:10px 14px;font-size:11.5px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#78716C;margin-bottom:8px">Order snapshot</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px"><div><span style="color:#A8A29E">Submitter:</span> ' + (s.submitterName||'') + '</div><div><span style="color:#A8A29E">Recipient:</span> ' + (s.recipientName||'') + '</div><div><span style="color:#A8A29E">Location:</span> <strong style="color:#4C3BAF">' + (s.locationId||'') + '</strong></div><div><span style="color:#A8A29E">Total:</span> <strong>$' + ((s.total||0).toFixed(2)) + '</strong></div></div></div></td></tr>';
                            }
                            return '<tr class="data-row' + (expandable?' expandable':'') + '" data-action="' + entry.action + '" data-idx="' + i + '" data-admin="' + (entry.adminEmail||'') + '" data-target="' + (entry.target||'') + '" data-detail="' + ((entry.detail&&entry.detail.reason)||'') + '" data-result="' + (entry.result||'') + '" data-ts="' + (entry.timestamp?entry.timestamp.slice(0,10):'') + '" onclick="' + (expandable?'toggleSnap('+i+')':'') + '" style="background:' + bg + '"><td style="padding:9px 8px;text-align:center;width:3%"><input type="checkbox" class="row-cb" onchange="updateSelCount()" style="cursor:pointer;accent-color:#1E3A5F"></td><td style="padding:9px 8px;text-align:center;color:#6366F1;font-size:12px;width:3%">' + (expandable?'<span id="chev-'+i+'">&#9658;</span>':'') + '</td><td style="padding:9px 10px;font-size:11px;font-weight:700;color:#1E3A5F;width:10%">' + dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + '<br><span style="font-size:10.5px;color:#57534E">' + dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) + '</span></td><td style="padding:9px 10px;width:15%"><div style="font-weight:500;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + ((entry.adminEmail||'').split('@')[0].replace('.',' ').replace(/\b\w/g,function(c){return c.toUpperCase()})) + '</div><div style="font-size:10px;color:#A8A29E;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (entry.adminEmail||'') + '</div></td><td style="padding:9px 10px;width:11%"><span style="display:inline-block;padding:2px 8px;border-radius:20px;background:' + m.bg + ';color:' + m.color + ';font-weight:600;font-size:10.5px;border:1px solid ' + (m.border||m.color) + '">' + m.label + '</span></td><td style="padding:9px 10px;font-size:11px;font-family:monospace;color:#4C3BAF;width:13%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (entry.target||'&mdash;') + '</td><td style="padding:9px 10px;font-size:11px;color:#0F172A;width:42%">' + detail + '</td><td style="padding:9px 10px;width:6%"><span style="font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;background:' + resBg + ';color:' + resColor + '">' + (entry.result||'') + '</span></td></tr>' + snapHtml;
                        }).join('');

                        const sidebarHtml = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).map(([action, count]) => {
                            const m = getMetaFn(action);
                            const dot = m.dot || m.color;
                            return '<div class="filter-row" onclick="filterType(\'' + action + '\')" data-action="' + action + '"><div class="fr-left"><div class="fr-dot" style="background:' + dot + '"></div><span class="fr-name">' + m.label + '</span></div><span class="fr-count">' + count + '</span></div>';
                        }).join('');

                        const allYears = availableYears;
                        const yearPills = allYears.map(y => '<button class="ypill' + (yearsToLoad.includes(y)?' on':'') + '" onclick="toggleYear(' + y + ',this)">' + y + '</button>').join('');

                        const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Audit Log — FPG Equipment Portal</title><style>

<script>
var ALL=[];
(function(){
  var rows=document.querySelectorAll('#tbody tr.data-row');
  rows.forEach(function(r){
    ALL.push({
      el:r,
      action:r.dataset.action||'',
      admin:(r.dataset.admin||'').toLowerCase(),
      target:(r.dataset.target||'').toLowerCase(),
      detail:(r.dataset.detail||'').toLowerCase(),
      result:r.dataset.result||'',
      ts:r.dataset.ts||''
    });
  });
  /* populate admin dropdown */
  var admins={};
  ALL.forEach(function(d){
    if(d.admin&&!admins[d.admin]){
      var name=d.admin.split('@')[0].replace('.',' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
      admins[d.admin]=name;
    }
  });
  var sel=document.getElementById('f-admin');
  Object.keys(admins).sort(function(a,b){return admins[a].localeCompare(admins[b]);}).forEach(function(a){
    var o=document.createElement('option');
    o.value=a;
    o.textContent=a.split('@')[0].replace('.',' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
    sel.appendChild(o);
  });
  /* stats */
  var tot=ALL.length,auth=0,ord=0,acc=0;
  ALL.forEach(function(d){
    if(d.action.startsWith('auth.'))auth++;
    else if(d.action.startsWith('order.'))ord++;
    else if(d.action.startsWith('access.')||d.action.startsWith('category.')||d.action.startsWith('portal.'))acc++;
  });
  document.getElementById('sc-total').textContent=tot;
  document.getElementById('sc-logins').textContent=auth;

function applyFilters(){
  var q=document.getElementById('q').value.toLowerCase();
  var ft=document.getElementById('f-type').value;
  var fa=document.getElementById('f-admin').value;
  var fr=document.getElementById('f-result').value;
  var df=document.getElementById('f-from').value;
  var dt=document.getElementById('f-to').value;
  var count=0;
  ALL.forEach(function(d){
    var show=true;
    if(ft&&d.action!==ft)show=false;
    if(fa&&d.admin!==fa)show=false;
    if(fr&&d.result!==fr)show=false;
    if(df&&d.ts&&d.ts<df)show=false;
    if(dt&&d.ts&&d.ts>dt)show=false;
    if(q&&!(d.admin.includes(q)||d.action.includes(q)||d.target.includes(q)||d.detail.includes(q)))show=false;
    d.el.style.display=show?'':'none';
    var sn=document.getElementById('sn-'+d.el.dataset.idx);
    if(!show&&sn)sn.style.display='none';
    if(show)count++;
  });
  document.getElementById('count-pill').textContent=count+' entr'+(count===1?'y':'ies');
}

function clearFilters(){
  ['q','f-from','f-to'].forEach(function(id){document.getElementById(id).value='';});
  ['f-type','f-admin','f-result'].forEach(function(id){document.getElementById(id).selectedIndex=0;});
  ALL.forEach(function(d){d.el.style.display='';});
  document.getElementById('count-pill').textContent=ALL.length+' entries';
}

function visibleRows(){
  return Array.from(document.querySelectorAll('#tbody tr.data-row')).filter(function(r){return r.style.display!=='none';});
}

function doExport(mode){
  document.getElementById('exp-menu').style.display='none';
  var rows=visibleRows();
  if(mode==='page')rows=rows.slice(0,25);
  if(mode==='selected')rows=rows.filter(function(r){var cb=r.querySelector('.row-cb');return cb&&cb.checked;});
  if(!rows.length){alert('No entries to export.');return;}
  var headers=['Timestamp','Admin','Action','Target','Detail','Result'];
  var lines=[headers.map(csvQ).join(',')];
  rows.forEach(function(r){
    var tds=r.querySelectorAll('td');
    if(tds.length<8)return;
    var ts=r.dataset.ts||tds[2].innerText.replace(/\n/g,' ').trim();
    var admin=tds[3].innerText.replace(/\n/g,' ').trim();
    var action=tds[4].innerText.trim();
    var target=tds[5].innerText.trim();
    var detail=tds[6].innerText.replace(/\n/g,' ').trim();
    var result=tds[7].innerText.trim();
    lines.push([ts,admin,action,target,detail,result].map(csvQ).join(','));
  });
  var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='fpg-audit-log-'+mode+'-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
