                } catch(e) { setStatus({ type: 'error', text: 'Failed to load audit log: ' + (e.message || 'Unknown error') }); }
            };

            const handleStatusChange = async function(order, newStatus) {
                try {
                    await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'update-order-status', orderId: order.id, newStatus, year: order.year })
                    });
                    setOrders(prev => prev.map(o => o.id === order.id ? { ...o, status: newStatus } : o));
                    setStatus({ type: 'success', text: `Order status updated to "${newStatus}"` });
                } catch(e) { setStatus({ type: 'error', text: 'Failed to update status' }); }
            };

            const handleSoftDelete = async function() {
                if (!deleteReason.trim()) return;
                try {
                    await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'delete-order', orderId: deleteModal.id, year: deleteModal.year, reason: deleteReason.trim() })
                    });
                    setOrders(prev => prev.map(o => o.id === deleteModal.id ? { ...o, status: 'Deleted', deletedBy: session.email, deleteReason: deleteReason.trim() } : o));
                    setStatus({ type: 'success', text: 'Order deleted' });
                } catch(e) { setStatus({ type: 'error', text: 'Failed to delete order' }); }
                setDeleteModal(null); setDeleteReason('');
            };

            const handleRestore = async function() {
                try {
                    await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'restore-order', orderId: restoreModal.id, year: restoreModal.year })
                    });
                    setOrders(prev => prev.map(o => o.id === restoreModal.id ? { ...o, status: 'New', deletedBy: undefined, deletedAt: undefined, deleteReason: undefined } : o));
                    setStatus({ type: 'success', text: 'Order restored' });
                } catch(e) { setStatus({ type: 'error', text: 'Failed to restore order' }); }
                setRestoreModal(null);
            };

            const handlePermDelete = async function() {
                if (!permDeleteReason.trim()) return;
                try {
                    await fetch(azureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                        body: JSON.stringify({ action: 'permanent-delete-order', orderId: permDeleteModal.id, year: permDeleteModal.year, reason: permDeleteReason.trim() })
                    });
                    setOrders(prev => prev.filter(o => o.id !== permDeleteModal.id));
                    setStatus({ type: 'success', text: 'Order permanently deleted' });
                } catch(e) { setStatus({ type: 'error', text: 'Failed to permanently delete order' }); }
                setPermDeleteModal(null); setPermDeleteReason('');
            };

            const toggleRow = function(orderId) {
                setExpandedRows(prev => ({ ...prev, [orderId]: !prev[orderId] }));
            };

            const toggleSelect = function(e, orderId) {
                e.stopPropagation();
                setSelectedOrders(prev => ({ ...prev, [orderId]: !prev[orderId] }));
            };

            const toggleSelectAll = function(e) {
                if (e.target.checked) {
                    const all = {};
                    filtered.forEach(o => { all[o.id] = true; });
                    setSelectedOrders(all);
                } else {
                    setSelectedOrders({});
                }
            };

            const exportToCSV = function(ordersToExport, filename) {
                const headers = ['Order ID','Date','Time','Submitter Name','Submitter Email','Recipient Name','Recipient Email','Location ID','Ship To','Items','Total','Status','Date Needed','Notes'];
                const rows = ordersToExport.map(o => {
                    const items = (o.items||[]).map(i => `${i.title} x${i.quantity||1} ($${(i.price||0).toFixed(2)})`).join('; ');
                    const dt = new Date(o.submittedAt);
                    return [
                        o.id,
                        dt.toLocaleDateString(),
                        dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
                        o.submitterName||'',
                        o.submitterEmail||'',
                        o.recipientName||'',
                        o.recipientEmail||'',
                        o.locationId||'',
                        `"${(o.shipTo||'').replace(/"/g,'""')}"`,
                        `"${items.replace(/"/g,'""')}"`,
                        (o.total||0).toFixed(2),
                        o.status||'',
                        o.dateNeeded||'',
                        `"${(o.notes||'').replace(/"/g,'""')}"`
                    ];
                });
                const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename || `orders-export-${Date.now()}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleExportAll = function() { exportToCSV(filtered, `orders-${yearFilter.join('-')}-all.csv`); };
            const handleExportSelected = function() {
                const sel = filtered.filter(o => selectedOrders[o.id]);
                exportToCSV(sel, `orders-selected-${Date.now()}.csv`);
            };
            const handleExportSingle = function(e, order) {
                e.stopPropagation();
                exportToCSV([order], `order-${order.id}.csv`);
            };

            // Filter logic
            const handleSort = function(col) {
                if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
                else { setSortCol(col); setSortDir('asc'); }
                setCurrentPage(1);
            };

            // Build unique submitters and locations for dropdowns
            const uniqueSubmitters = [...new Map(orders.map(o => [o.submitterEmail, o.submitterName])).entries()].sort((a,b)=>a[1].localeCompare(b[1]));
            const uniqueLocations = [...new Set(orders.map(o => o.locationId).filter(Boolean))].sort();

            const filtered = orders.filter(o => {
                if (!showDeleted && o.status === 'Deleted') return false;
                if (statusFilter !== 'all' && o.status !== statusFilter) return false;
                if (submitterFilter !== 'all' && o.submitterEmail !== submitterFilter) return false;
                if (locationFilter !== 'all' && o.locationId !== locationFilter) return false;
                if (dateFrom) { const d = new Date(o.submittedAt); if (d < new Date(dateFrom)) return false; }
                if (dateTo) { const d = new Date(o.submittedAt); if (d > new Date(dateTo + 'T23:59:59')) return false; }
                if (minTotal && (o.total || 0) < parseFloat(minTotal)) return false;
                if (maxTotal && (o.total || 0) > parseFloat(maxTotal)) return false;
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    return (o.submitterName||'').toLowerCase().includes(q) ||
                           (o.submitterEmail||'').toLowerCase().includes(q) ||
                           (o.recipientName||'').toLowerCase().includes(q) ||
                           (o.locationId||'').toLowerCase().includes(q) ||
                           (o.shipTo||'').toLowerCase().includes(q) ||
                           (o.id||'').toLowerCase().includes(q);
                }
                return true;
            }).sort((a, b) => {
                let av = a[sortCol], bv = b[sortCol];
                if (sortCol === 'total') { av = a.total||0; bv = b.total||0; return sortDir==='asc' ? av-bv : bv-av; }
                if (sortCol === 'submittedAt') { av = new Date(a.submittedAt); bv = new Date(b.submittedAt); return sortDir==='asc' ? av-bv : bv-av; }
                av = (av||'').toString().toLowerCase(); bv = (bv||'').toString().toLowerCase();
                return sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
            });

            const totalPages = pageSize === 'all' ? 1 : Math.ceil(filtered.length / pageSize);
            const paginated = pageSize === 'all' ? filtered : filtered.slice((currentPage-1)*pageSize, currentPage*pageSize);

            const handleFilterChange = (setter) => (e) => { setter(e.target.value); setCurrentPage(1); };

            const stats = {
                total: orders.filter(o => o.status !== 'Deleted').length,
                newOrders: orders.filter(o => o.status === 'New').length,
                inProgress: orders.filter(o => o.status === 'In Progress').length,
                totalValue: orders.filter(o => o.status !== 'Deleted').reduce((s, o) => s + (o.total || 0), 0),
                deleted: orders.filter(o => o.status === 'Deleted').length
            };

            const badgeStyle = (status) => {
                if (status === 'New') return { background:'#E6F1FB', color:'#0C447C', padding:'2px 10px', borderRadius:'20px', fontSize:'11px', fontWeight:500 };
                if (status === 'In Progress') return { background:'#FEF3C7', color:'#92400E', padding:'2px 10px', borderRadius:'20px', fontSize:'11px', fontWeight:500 };
                if (status === 'Fulfilled') return { background:'#D1FAE5', color:'#065F46', padding:'2px 10px', borderRadius:'20px', fontSize:'11px', fontWeight:500 };
                if (status === 'Deleted') return { background:'#FEE2E2', color:'#991B1B', padding:'2px 10px', borderRadius:'20px', fontSize:'11px', fontWeight:500 };
                return { padding:'2px 10px', borderRadius:'20px', fontSize:'11px', fontWeight:500 };
            };

            const actionLabel = (action) => {
                const map = {
                    'auth.login': '🔐 Login', 'auth.auto_logoff': '⏱ Auto-logout', 'auth.logout': '🚪 Logout',
                    'order.status_change': '🔄 Status changed', 'order.soft_delete': '🗑 Order deleted',
                    'order.restore': '↩️ Order restored', 'order.permanent_delete': '❌ Permanently deleted',
                    'order.permanent_delete_attempt': '🚫 Perm. delete denied',
                    'access.admin_added': '➕ Admin added', 'access.admin_removed': '➖ Admin removed',
                };
                return map[action] || action;
            };

            return (
                <div style={{padding:'1.5rem'}}>
                    {status && (
                        <div style={{padding:'10px 16px',borderRadius:'8px',marginBottom:'1rem',fontSize:'13px',fontWeight:500,
                            background: status.type==='success'?'#D1FAE5':'#FEE2E2',
                            color: status.type==='success'?'#065F46':'#991B1B'}}>
                            {status.type==='success'?'✅':'❌'} {status.text}
                            <button onClick={()=>setStatus(null)} style={{float:'right',background:'none',border:'none',cursor:'pointer',fontSize:'14px'}}>✕</button>
                        </div>
                    )}
                    <div style={{height:'3px',background:'linear-gradient(90deg,#DB802E,#EFA855,#DB802E)',borderRadius:'2px',marginBottom:'16px'}}></div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'0',marginBottom:'20px',borderRadius:'10px',overflow:'hidden',border:'1px solid #1E3A5F'}}>
                        {[
                            {label:'Total orders', value: stats.total, sub:'All time', color:'#FFFFFF'},
                            {label:'New · Awaiting action', value: stats.newOrders, sub:'Pending IT review', color:'#60B4FF'},
                            {label:'In progress · Fulfilled', value: stats.inProgress, sub:'Being sourced', color:'#FFD966'},
                            {label:'Total value · This year', value: '$'+stats.totalValue.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}), sub:`Year ${currentYear}`, color:'#4ADE80'},
                            {label:'Soft deleted', value: stats.deleted, sub: stats.deleted > 0 ? 'Click to view' : 'None', color: stats.deleted > 0 ? '#FF8585' : 'rgba(255,255,255,0.35)', clickable: stats.deleted > 0},
                        ].map((s,i) => (
                            <div key={i}
                                onClick={s.clickable ? ()=>setShowDeleted(true) : undefined}
                                style={{background:'#1E3A5F',borderRight:i<4?'1px solid rgba(219,128,46,0.25)':'none',padding:'14px 16px',cursor:s.clickable?'pointer':'default'}}>
                                <div style={{fontSize:'10px',fontWeight:700,color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'6px'}}>{s.label}</div>
                                <div style={{fontSize:'24px',fontWeight:500,color:s.color,fontFamily:"Georgia,'Times New Roman',serif"}}>{s.value}</div>
                                <div style={{fontSize:'10.5px',color:i===4 && stats.deleted>0?'#FCA5A5':'rgba(255,255,255,0.35)',marginTop:'3px'}}>{s.sub}</div>
                            </div>
                        ))}
                    </div>
                    <div style={{display:'flex',gap:'8px',marginBottom:'8px',flexWrap:'wrap',alignItems:'center'}}>
                        <div style={{flex:1,minWidth:'260px',position:'relative'}}>
                            <span style={{position:'absolute',left:'10px',top:'50%',transform:'translateY(-50%)',color:'#4C3BAF',fontSize:'15px'}}>🔍</span>
                            <input type="text" placeholder="Search name, email, location, recipient, address..." value={searchQuery}
                                onChange={handleFilterChange(setSearchQuery)}
                                style={{width:'100%',padding:'9px 12px 9px 34px',border:'1.5px solid #4C3BAF',borderRadius:'8px',fontSize:'13px',background:'white',color:'#1E3A5F'}} />
                        </div>
                        <select value={statusFilter} onChange={handleFilterChange(setStatusFilter)}
                            style={{padding:'9px 12px',border:'1.5px solid #4C3BAF',borderRadius:'8px',fontSize:'13px',minWidth:'140px',background:'white',color:'#1E3A5F',fontWeight:500}}>
                            <option value="all">All statuses</option>
                            <option value="New">New</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Fulfilled">Fulfilled</option>
                            {showDeleted && <option value="Deleted">Deleted</option>}
                        </select>
                        <select value={submitterFilter} onChange={handleFilterChange(setSubmitterFilter)}
                            style={{padding:'9px 12px',border:'1.5px solid #4C3BAF',borderRadius:'8px',fontSize:'13px',minWidth:'155px',background:'white',color:'#1E3A5F',fontWeight:500}}>
                            <option value="all">All submitters</option>
                            {uniqueSubmitters.map(([email, name]) => (
                                <option key={email} value={email}>{name}</option>
                            ))}
                        </select>
                        <select value={locationFilter} onChange={handleFilterChange(setLocationFilter)}
                            style={{padding:'9px 12px',border:'1.5px solid #4C3BAF',borderRadius:'8px',fontSize:'13px',minWidth:'145px',background:'white',color:'#1E3A5F',fontWeight:500}}>
                            <option value="all">All locations</option>
                            {uniqueLocations.map(loc => (
                                <option key={loc} value={loc}>{loc}</option>
                            ))}
                        </select>
                    </div>
                    <div style={{display:'flex',gap:'7px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center',background:'#F0F4F8',padding:'10px 12px',borderRadius:'8px',border:'0.5px solid #C7D9F0'}}>
                        <span style={{fontSize:'12px',color:'#4C3BAF',fontWeight:700}}>Date:</span>
                        <input type="date" value={dateFrom} onChange={handleFilterChange(setDateFrom)}
                            style={{padding:'6px 9px',border:'1.5px solid #4C3BAF',borderRadius:'7px',fontSize:'12px',background:'white',color:'#1E3A5F'}} />
                        <span style={{fontSize:'12px',color:'#78716C',fontWeight:500}}>to</span>
                        <input type="date" value={dateTo} onChange={handleFilterChange(setDateTo)}
                            style={{padding:'6px 9px',border:'1.5px solid #4C3BAF',borderRadius:'7px',fontSize:'12px',background:'white',color:'#1E3A5F'}} />
                        <div style={{width:'1px',height:'20px',background:'#C7D9F0',margin:'0 4px'}}></div>
                        <span style={{fontSize:'12px',color:'#4C3BAF',fontWeight:700}}>$ Total:</span>
                        <input type="number" placeholder="Min" value={minTotal} onChange={handleFilterChange(setMinTotal)}
                            style={{width:'75px',padding:'6px 9px',border:'1.5px solid #4C3BAF',borderRadius:'7px',fontSize:'12px',background:'white',color:'#1E3A5F'}} />
                        <span style={{fontSize:'12px',color:'#78716C',fontWeight:500}}>to</span>
                        <input type="number" placeholder="Max" value={maxTotal} onChange={handleFilterChange(setMaxTotal)}
                            style={{width:'75px',padding:'6px 9px',border:'1.5px solid #4C3BAF',borderRadius:'7px',fontSize:'12px',background:'white',color:'#1E3A5F'}} />
                        <div style={{width:'1px',height:'20px',background:'#C7D9F0',margin:'0 4px'}}></div>
                        {availableYears.map(y => (
                            <button key={y} onClick={()=>{setYearFilter(prev=>prev.includes(y)?prev.filter(x=>x!==y):[...prev,y]);setCurrentPage(1);}}
                                style={{padding:'5px 14px',border:'1.5px solid #4C3BAF',borderRadius:'20px',fontSize:'12px',fontWeight:700,cursor:'pointer',
                                    background:yearFilter.includes(y)?'#4C3BAF':'white',
                                    color:yearFilter.includes(y)?'white':'#4C3BAF'}}>
                                {y}
                            </button>
                        ))}
                        <span style={{fontSize:'12px',color:'#4C3BAF',fontWeight:500,marginLeft:'4px'}}>
                            Showing <strong style={{color:'#1E3A5F'}}>{filtered.length}</strong> of <strong style={{color:'#1E3A5F'}}>{orders.filter(o=>showDeleted||o.status!=="Deleted").length}</strong> orders
                        </span>
                        <div style={{marginLeft:'auto',display:'flex',gap:'6px'}}>
                            <button onClick={()=>setShowDeleted(p=>!p)}
                                style={{padding:'6px 12px',border:'1.5px solid',borderRadius:'8px',fontSize:'12px',fontWeight:500,cursor:'pointer',
                                    borderColor:showDeleted?'#DC2626':'#4C3BAF',
                                    background:showDeleted?'#FEE2E2':'white',
                                    color:showDeleted?'#DC2626':'#4C3BAF'}}>
                                {showDeleted?'Hide deleted':'Show deleted'}
                            </button>
                            <div style={{position:'relative'}}>
                                <button onClick={()=>setShowExportMenu(p=>!p)}
                                    style={{padding:'6px 12px',border:'1.5px solid #4C3BAF',borderRadius:'8px',fontSize:'12px',fontWeight:500,cursor:'pointer',background:showExportMenu?'#4C3BAF':'white',color:showExportMenu?'white':'#4C3BAF',display:'flex',alignItems:'center',gap:'5px'}}>
                                    ⬇ Export <span style={{fontSize:'10px'}}>{showExportMenu?'▲':'▼'}</span>
                                </button>
                                {showExportMenu && (
                                    <div style={{position:'absolute',top:'calc(100% + 4px)',right:0,background:'white',border:'1.5px solid #4C3BAF',borderRadius:'8px',boxShadow:'0 4px 16px rgba(0,0,0,0.12)',zIndex:200,minWidth:'210px',overflow:'hidden'}}>
                                        <div style={{padding:'6px 8px',background:'#F0F4F8',borderBottom:'0.5px solid #C7D9F0',fontSize:'10px',fontWeight:700,color:'#4C3BAF',textTransform:'uppercase',letterSpacing:'0.07em'}}>
                                            Choose what to export
                                        </div>
                                        <button onClick={()=>{exportToCSV(paginated,`orders-page-${currentPage}.csv`);setShowExportMenu(false);}}
                                            style={{width:'100%',padding:'9px 14px',border:'none',borderBottom:'0.5px solid #E7E5E4',background:'white',textAlign:'left',cursor:'pointer',fontSize:'12px',color:'#1E3A5F',fontFamily:'inherit'}}>
                                            <div style={{fontWeight:600}}>This page only</div>
                                            <div style={{fontSize:'11px',color:'#78716C',marginTop:'1px'}}>{paginated.length} orders currently visible</div>
                                        </button>
                                        <button onClick={()=>{exportToCSV(filtered,`orders-${yearFilter.join('-')}-filtered.csv`);setShowExportMenu(false);}}
                                            style={{width:'100%',padding:'9px 14px',border:'none',borderBottom:'0.5px solid #E7E5E4',background:'white',textAlign:'left',cursor:'pointer',fontSize:'12px',color:'#1E3A5F',fontFamily:'inherit'}}>
                                            <div style={{fontWeight:600}}>All filtered results</div>
                                            <div style={{fontSize:'11px',color:'#78716C',marginTop:'1px'}}>{filtered.length} orders matching current filters</div>
                                        </button>
                                        <button onClick={()=>{
                                            const sel = filtered.filter(o=>selectedOrders[o.id]);
                                            if(!sel.length){alert('No orders selected. Use the checkboxes to select orders first.');return;}
                                            exportToCSV(sel,`orders-selected-${Date.now()}.csv`);
                                            setShowExportMenu(false);
                                        }}
                                            style={{width:'100%',padding:'9px 14px',border:'none',background:'white',textAlign:'left',cursor:'pointer',fontSize:'12px',color: Object.values(selectedOrders).some(Boolean)?'#1E3A5F':'#A8A29E',fontFamily:'inherit'}}>
                                            <div style={{fontWeight:600}}>Selected orders only</div>
                                            <div style={{fontSize:'11px',color:'#78716C',marginTop:'1px'}}>{Object.values(selectedOrders).filter(Boolean).length} orders selected</div>
                                        </button>
                                    </div>
                                )}
                            </div>
                            <button onClick={()=>loadAuditLog()}
                                style={{padding:'6px 12px',border:'none',borderRadius:'8px',fontSize:'12px',fontWeight:600,cursor:'pointer',background:'#4C3BAF',color:'white'}}>
                                Audit log
                            </button>
                        </div>
                    </div>
                    {loading ? (
                        <div style={{textAlign:'center',padding:'3rem',color:'#A8A29E'}}>Loading orders...</div>
                    ) : filtered.length === 0 ? (
                        <div style={{textAlign:'center',padding:'3rem',color:'#A8A29E',background:'white',borderRadius:'10px',border:'0.5px solid #E7E5E4'}}>
                            {orders.length === 0 ? 'No orders yet.' : 'No orders match your filters.'}
                        </div>
                    ) : (
                        <div style={{background:'white',borderRadius:'10px',border:'0.5px solid #E7E5E4',overflow:'hidden'}}>
                            {Object.values(selectedOrders).some(Boolean) && (
                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'#EEF4FF',borderBottom:'0.5px solid #B5D4F4'}}>
                                    <span style={{fontSize:'12px',color:'#0C447C',fontWeight:500}}>
                                        {Object.values(selectedOrders).filter(Boolean).length} order{Object.values(selectedOrders).filter(Boolean).length > 1 ? 's' : ''} selected
                                    </span>
                                    <button onClick={handleExportSelected}
                                        style={{padding:'4px 14px',background:'#1E3A5F',color:'white',border:'none',borderRadius:'6px',fontSize:'11px',cursor:'pointer',fontFamily:'inherit',fontWeight:500}}>
                                        ⬇ Export selected
                                    </button>
                                </div>
                            )}
                            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px',tableLayout:'fixed'}}>
                                <thead>
                                    <tr style={{background:'#FAFAF9'}}>
                                        <th style={{padding:'9px 10px',width:'3%',borderBottom:'0.5px solid #E7E5E4'}}>
                                            <input type="checkbox" onChange={toggleSelectAll}
                                                checked={filtered.length > 0 && filtered.every(o => selectedOrders[o.id])}
                                                style={{cursor:'pointer',accentColor:'#1E3A5F'}} />
                                        </th>
                                        <th style={{padding:'9px 10px',width:'3%',borderBottom:'0.5px solid #E7E5E4'}}></th>
                                        {[
                                            {label:'Date/Time', col:'submittedAt', w:'10%'},
                                            {label:'Submitted by', col:'submitterName', w:'13%'},
                                            {label:'Recipient', col:'recipientName', w:'10%'},
                                            {label:'Location', col:'locationId', w:'7%'},
                                            {label:'Ship To', col:'shipTo', w:'15%'},
                                            {label:'Total', col:'total', w:'8%'},
                                            {label:'Status', col:'status', w:'9%'},
                                            {label:'Actions', col:null, w:'12%'},
                                        ].map((h,i) => (
                                            <th key={i} onClick={h.col ? ()=>handleSort(h.col) : undefined}
                                                style={{padding:'9px 10px',textAlign:'left',fontSize:'11px',fontWeight:700,color:'#1E3A5F',textTransform:'uppercase',
                                                    letterSpacing:'0.05em',borderBottom:'3px solid #6366F1',width:h.w,
                                                    cursor:h.col?'pointer':'default',userSelect:'none',background:'#1E3A5F',color:'white'}}>
                                                {h.label}
                                                {h.col && <span style={{marginLeft:'4px',fontSize:'10px',opacity:sortCol===h.col?1:0.35,color:sortCol===h.col?'#4C3BAF':'#78716C'}}>
                                                    {sortCol===h.col ? (sortDir==='asc'?'▲':'▼') : '⇅'}
                                                </span>}
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                {paginated.map((order, rowIndex) => (
                                        <React.Fragment key={order.id}>

                (async () => {

                        const year = new Date().getFullYear();

<div class="layout">

  <div class="main">

    <div class="table-scroll"><table><thead><tr>

<script>
function toggleExportMenu(){var m=document.getElementById("exp-menu");var a=document.getElementById("exp-arrow");var open=m.style.display!=="none";m.style.display=open?"none":"block";a.innerHTML=open?"&#9660;":"&#9650;";if(!open){var vis=document.querySelectorAll("#ab tr:not(.snap):not([style*='display:none'])");var sel=document.querySelectorAll("#ab tr:not(.snap) .row-cb:checked");document.getElementById("page-count-label").textContent="First 25 of "+vis.length+" visible entries";document.getElementById("filtered-count-label").textContent=vis.length+" entries matching current filters";document.getElementById("selected-count-label").textContent=sel.length+" entries selected";}}
function closeExportMenu(){var m=document.getElementById("exp-menu");if(m)m.style.display="none";var a=document.getElementById("exp-arrow");if(a)a.innerHTML="&#9660;";}
document.addEventListener("click",function(e){if(!e.target.closest("#exp-menu")&&!e.target.closest(".exp-btn"))closeExportMenu();});
function exportMode(mode){closeExportMenu();var rows=document.querySelectorAll("#ab tr:not(.snap)");var h=["Timestamp","Admin","Action","Target","Detail","Result"];var lines=[h.join(",")];var toExport=[];rows.forEach(function(r,i){if(r.style.display==="none")return;if(mode==="page"&&i>=25)return;if(mode==="selected"){var cb=r.querySelector(".row-cb");if(!cb||!cb.checked)return;}toExport.push(r);});toExport.forEach(function(r){var c=r.querySelectorAll("td");if(c.length<7)return;lines.push([1,2,3,4,5,6].map(function(i){return'"'+c[i].innerText.replace(/"/g,'""').replace(/\n/g," ").trim()+'"';}).join(","));});if(toExport.length===0){alert("No entries to export. Check your selection.");return;}var b=new Blob([lines.join("\n")],{type:"text/csv"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="audit-log-"+mode+".csv";a.click();URL.revokeObjectURL(u);}
function toggleSnap(i){var r=document.getElementById("snap-"+i);var c=document.getElementById("chev-"+i);if(!r)return;var o=r.style.display!=="none";r.style.display=o?"none":"table-row";if(c)c.innerHTML=o?"&#9658;":"&#9660;";}
function filterType(t){document.querySelectorAll(".filter-row").forEach(function(e){e.classList.remove("active")});document.getElementById("all-btn").classList.remove("active");if(t==="all"){document.getElementById("all-btn").classList.add("active")}else{var el=document.querySelector("[data-action=\""+t+"\"]");if(el)el.classList.add("active")}window._type=t;applyFilters();}
function applyFilters(){var q=(document.getElementById("search-input").value||"").toLowerCase();var rows=document.querySelectorAll("#ab tr:not(.snap)");var count=0;rows.forEach(function(row){var a=row.getAttribute("data-action")||"";var text=row.textContent.toLowerCase();var tm=(!window._type||window._type==="all"||a===window._type);var sm=!q||text.includes(q);row.style.display=(tm&&sm)?"":"none";if(tm&&sm)count++;});document.getElementById("vc").textContent=count;}
function toggleSelectAll(cb){document.querySelectorAll("#ab tr:not(.snap) .row-cb").forEach(function(c){c.checked=cb.checked;});updateSelCount();}
function updateSelCount(){var sel=document.querySelectorAll("#ab tr:not(.snap) .row-cb:checked").length;var lbl=document.getElementById("selected-count-label");if(lbl)lbl.textContent=sel+" entries selected";}
function toggleYear(y,btn){alert("Close this tab and reselect years in the admin panel, then click Audit Log again.");}
window._type="all";
var _d=document.querySelectorAll("#ab tr:not(.snap)");var tot=_d.length,log=0,del=0,stat=0;
_d.forEach(function(r){var a=r.getAttribute("data-action")||"";if(a.includes("login")||a.includes("logoff"))log++;if(a.includes("delete"))del++;if(a.includes("status"))stat++;});
document.getElementById("sc-total").textContent=tot;
document.getElementById("sc-logins").textContent=log;
document.getElementById("sc-deletes").textContent=del;
document.getElementById("sc-status").textContent=stat;
<\/script></body></html>`

                        Loading audit log...
                    </div>

            if (status === 'error') {
                return (
                    <div style={{padding:'2rem',textAlign:'center',color:'#DC2626'}}>

        // ─── VERSION CONTROL — SUPERADMIN ONLY ──────────────────────────
        function VersionControl({ session, azureUrl }) {
            const [versions, setVersions] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [status, setStatus] = React.useState(null);

            React.useEffect(() => {
                // Load version history from audit log entries with action portal.version
                fetch('./audit-log-' + new Date().getFullYear() + '.json?' + Date.now())
                    .then(r => r.json())
                    .then(data => {
                        const versionEntries = (data || [])
                            .filter(e => e.action && e.action.startsWith('portal.'))
                            .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                        setVersions(versionEntries);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            if (session.role !== 'superadmin') {
                return (
                    <div style={{textAlign:'center',padding:'3rem',color:'#94A3B8'}}>
                        <div style={{fontSize:'2rem',marginBottom:'12px'}}>🔒</div>
                        <div style={{fontWeight:600,color:'#475569'}}>Superadmin access required</div>
                        <div style={{fontSize:'13px',marginTop:'6px'}}>Version control is restricted to superadmins only.</div>
                    </div>
                );
            }

            return (
                <div>
                    <div style={{background:'#FEF9C3',border:'1.5px solid #FDE68A',borderRadius:'12px',padding:'14px 18px',marginBottom:'20px',display:'flex',alignItems:'flex-start',gap:'12px'}}>
                        <span style={{fontSize:'20px',flexShrink:0}}>⚠️</span>
                        <div>
                            <div style={{fontWeight:700,fontSize:'13px',color:'#854D0E',marginBottom:'4px'}}>Superadmin only — Version Control</div>
                            <div style={{fontSize:'12px',color:'#92400E',lineHeight:1.5}}>
                                This section logs every update to <strong>admin.html</strong> and <strong>index.html</strong>. 
                                All changes are recorded in the Audit Log automatically when products are published 
                                or when portal files are updated via the Azure Function.
                            </div>
                        </div>
                    </div>

                    <div style={{background:'white',borderRadius:'12px',border:'0.5px solid #E2E8F0',overflow:'hidden'}}>
                        <div style={{padding:'14px 18px',borderBottom:'0.5px solid #E2E8F0',background:'#F5F3FF',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <div>
                                <div style={{fontWeight:700,fontSize:'14px',color:'#1E3A5F'}}>🔖 Portal Version History</div>
                                <div style={{fontSize:'11px',color:'#64748B',marginTop:'2px'}}>admin.html · index.html · Recorded automatically</div>
                            </div>
                            <div style={{fontSize:'12px',color:'#4C3BAF',fontWeight:600,background:'#EDE9FE',padding:'4px 12px',borderRadius:'20px'}}>
                                {versions.length} change{versions.length !== 1 ? 's' : ''} logged
                            </div>
                        </div>

                        {loading ? (
                            <div style={{padding:'2rem',textAlign:'center',color:'#94A3B8'}}>Loading version history...</div>
                        ) : versions.length === 0 ? (
                            <div style={{padding:'2rem',textAlign:'center',color:'#94A3B8'}}>
                                <div style={{fontSize:'1.5rem',marginBottom:'8px'}}>📋</div>
                                No portal changes recorded yet this year.<br/>
                                <span style={{fontSize:'12px'}}>Changes are logged automatically when you publish products or update portal files.</span>
                            </div>
                        ) : (
                            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
                                <thead>
                                    <tr style={{background:'#1E3A5F'}}>
                                        <th style={{padding:'10px 14px',textAlign:'left',color:'white',fontWeight:700,fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.06em',width:'16%'}}>Date / Time</th>
                                        <th style={{padding:'10px 14px',textAlign:'left',color:'white',fontWeight:700,fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.06em',width:'16%'}}>Admin</th>
                                        <th style={{padding:'10px 14px',textAlign:'left',color:'white',fontWeight:700,fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.06em',width:'14%'}}>Action</th>
                                        <th style={{padding:'10px 14px',textAlign:'left',color:'white',fontWeight:700,fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.06em',width:'14%'}}>File</th>
                                        <th style={{padding:'10px 14px',textAlign:'left',color:'white',fontWeight:700,fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.06em'}}>Detail</th>
                                        <th style={{padding:'10px 14px',textAlign:'left',color:'white',fontWeight:700,fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.06em',width:'10%'}}>Commit</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {versions.map((v, i) => {
                                        const dt = new Date(v.timestamp);
                                        const detail = v.detail || {};
                                        const actionLabel = {
                                            'portal.products_published': 'Products published',
                                            'portal.admin_updated': 'Admin portal updated',
                                            'portal.ordering_updated': 'Ordering portal updated',
                                        }[v.action] || v.action;
                                        const fileBadgeColor = v.action === 'portal.products_published' ? '#EEF2FF' : '#F0FDF4';
                                        const fileBadgeText = v.action === 'portal.products_published' ? '#4C3BAF' : '#166534';
                                        const fileName = detail.file || (v.action === 'portal.products_published' ? 'products.json' : 'portal file');
                                        return (
                                            <tr key={i} style={{background: i % 2 === 0 ? 'white' : '#F5F3FF', borderBottom:'0.5px solid #F1F5F9'}}>
                                                <td style={{padding:'10px 14px',color:'#1E3A5F',fontWeight:600}}>
                                                    {dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                                                    <br/><span style={{fontSize:'10.5px',color:'#64748B',fontWeight:400}}>{dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
                                                </td>
                                                <td style={{padding:'10px 14px',color:'#0F172A'}}>
                                                    <div style={{fontWeight:500}}>{(v.adminEmail||'').split('@')[0]}</div>
                                                    <div style={{fontSize:'10px',color:'#94A3B8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'140px'}}>{v.adminEmail}</div>
                                                </td>
                                                <td style={{padding:'10px 14px'}}>
                                                    <span style={{background:'#EDE9FE',color:'#4C3BAF',padding:'2px 8px',borderRadius:'20px',fontWeight:600,fontSize:'11px'}}>{actionLabel}</span>
                                                </td>
                                                <td style={{padding:'10px 14px'}}>
                                                    <span style={{background:fileBadgeColor,color:fileBadgeText,padding:'2px 8px',borderRadius:'20px',fontWeight:600,fontSize:'11px',fontFamily:'monospace'}}>{fileName}</span>
                                                </td>
                                                <td style={{padding:'10px 14px',color:'#475569',fontSize:'11px'}}>
                                                    {detail.productsCount ? `${detail.productsCount} products` : ''}
                                                    {detail.message || ''}
                                                </td>
                                                <td style={{padding:'10px 14px'}}>
                                                    {detail.commitSha ? (
                                                        <span style={{fontFamily:'monospace',fontSize:'11px',color:'#4C3BAF',background:'#EDE9FE',padding:'2px 6px',borderRadius:'4px'}}>
                                                            {detail.commitSha.slice(0,7)}
                                                        </span>
                                                    ) : <span style={{color:'#94A3B8'}}>—</span>}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
