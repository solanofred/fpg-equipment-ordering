                                                            onChange={(e) => setCustomMarkup(e.target.value)}
                                                            onKeyPress={(e) => {
                                                                if (e.key === 'Enter') {
                                                                    e.preventDefault();
                                                                    applyCustomMarkup();
                                                                }
                                                            }}
                                                            min="0"
                                                            step="0.1"
                                                        />
                                                        <span style={{ fontSize: '0.9rem' }}>%</span>
                                                        <button
                                                            type="button"
                                                            className="btn-apply-custom"
                                                            onClick={applyCustomMarkup}
                                                        >
                                                            Apply
                                                        </button>
                                                    </div>
                                                </div>
                                                
                                                <div className="price-calc-total">
                                                    <span>Total Package Price:</span>
                                                    <span style={{ color: 'var(--primary)' }}>${totalPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                                </div>
                                                
                                                {isUnderpriced && (
                                                    <div className="price-warning">
                                                        <span style={{ fontSize: '1.25rem' }}>⚠️</span>
                                                        <div>
                                                            <strong>Warning: Total price is LESS than items subtotal!</strong>
                                                            <br />
                                                            You're underpricing by ${(itemsSubtotal - totalPrice).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {hasMarkup && !isUnderpriced && (
                                                    <div className="price-good">
                                                        <span style={{ fontSize: '1.25rem' }}>✓</span>
                                                        <div>
                                                            Markup: ${(totalPrice - itemsSubtotal).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} 
                                                            ({Math.round(((totalPrice - itemsSubtotal) / itemsSubtotal) * 100)}%)
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {totalPrice === itemsSubtotal && totalPrice > 0 && (
                                                    <div className="price-good">
                                                        <span style={{ fontSize: '1.25rem' }}>✓</span>
                                                        <div>Total matches items exactly (no markup)</div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">Total Price * (can be manually overridden)</label>
                                    <input
                                        type="number"
                                        className="form-input"
                                        value={formData.price}
                                        onChange={(e) => setFormData({ ...formData, price: parseFloat(e.target.value) || 0 })}
                                        min="0"
                                        step="0.01"
                                        required
                                        style={{ fontSize: '1.1rem', fontWeight: '600', color: 'var(--primary)' }}
                                    />
                                    <small style={{ color: 'var(--fpg-gray)', fontSize: '0.85rem', display: 'block', marginTop: '0.5rem' }}>
                                        💡 Use markup buttons above or type manually to adjust for state-specific pricing
                                    </small>
                                </div>
                            </div>
                            
                            <div className="modal-footer">
                                <button type="button" className="btn-secondary" onClick={onClose}>
                                    Cancel
                                </button>
                                <button type="submit" className="btn-save">
                                    Save Product
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function AccessManagement({ session, azureUrl, adminPortalUrl }) {
            const [admins, setAdmins] = useState([]);
            const [loading, setLoading] = useState(true);
            const [newName, setNewName] = useState('');
            const [newEmail, setNewEmail] = useState('');
            const [adding, setAdding] = useState(false);
            const [status, setStatus] = useState(null); // { type: 'success'|'error', message }

            const callApi = async (action, extra = {}) => {
                const res = await fetch(azureUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-email': session.email },
                    body: JSON.stringify({ action, ...extra })
                });
                const text = await res.text();
                if (!text || text.trim() === '') {
                    throw new Error('Azure Function returned empty response. Check function deployment.');
                }
                let data;
                try {
                    data = JSON.parse(text);
                } catch(e) {
                    throw new Error('Invalid response from server: ' + text.substring(0, 100));
                }
                if (!res.ok) throw new Error(data.message || 'Request failed');
                return data;
            };

            const loadAdmins = async () => {
                try {
                    setLoading(true);
                    // Try Azure Function first, fall back to direct file read
                    let adminList = [];
                    try {
                        const data = await callApi('get-admins');
                        adminList = data.admins || [];
                    } catch (e) {
                        // Fallback: load directly from admins.json
                        const res = await fetch('./admins.json');
                        if (res.ok) {
                            adminList = await res.json();
                        } else {
                            throw new Error('Could not load admins from either source');
                        }
                    }
                    setAdmins(adminList);
                } catch (e) {
                    setStatus({ type: 'error', message: 'Could not load admins: ' + e.message });
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { loadAdmins(); }, []);

            const handleAdd = async () => {
                if (!newName.trim() || !newEmail.trim()) {
                    setStatus({ type: 'error', message: 'Please enter both name and email.' });
                    return;
                }
                if (!newEmail.includes('@')) {
                    setStatus({ type: 'error', message: 'Please enter a valid email address.' });
                    return;
                }
                setAdding(true);
                setStatus(null);
                try {
                    const data = await callApi('add-admin', { newAdminEmail: newEmail, newAdminName: newName });
                    setAdmins(data.admins);
                    setStatus({ type: 'success', message: `${newName} has been added! Sending invite email...` });

                    // Open mailto invite
                    const subject = encodeURIComponent('Equipment Admin Access Approved by Fred Solano');
                    const body = encodeURIComponent(
                        `Hi ${newName},

You have been granted access to the FPG Equipment Ordering Admin Portal.

You can access the admin panel here:
${adminPortalUrl}

Log in using this email address: ${newEmail.toLowerCase().trim()}

Best regards,
FPG IT Team`
                    );
                    // Use hidden link to avoid page navigation
                    const mailtoLink = document.createElement('a');
                    mailtoLink.href = `mailto:${newEmail}?subject=${subject}&body=${body}`;
                    mailtoLink.style.display = 'none';
                    document.body.appendChild(mailtoLink);
                    mailtoLink.click();
                    setTimeout(() => document.body.removeChild(mailtoLink), 100);

                    setNewName('');
                    setNewEmail('');
                } catch (e) {
                    setStatus({ type: 'error', message: e.message });
                } finally {
                    setAdding(false);
                }
            };

            const handleRemove = async (adminEmail, adminName) => {
                if (!confirm(`Remove ${adminName} (${adminEmail}) from admin access?`)) return;
                setStatus(null);
                try {
                    const data = await callApi('remove-admin', { removeEmail: adminEmail });
                    setAdmins(data.admins);
                    setStatus({ type: 'success', message: `${adminName} has been removed.` });
                } catch (e) {
                    setStatus({ type: 'error', message: e.message });
                }
            };

            const getInitials = (name) => name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
            const formatDate = (iso) => iso ? new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';

            return (
                <div className="access-section">
                    {/* Current Admins */}
                    <div className="access-card">
                        <div className="access-card-header">
                            <h3>👥 Current Admins</h3>
                            <p>{loading ? 'Loading...' : `${admins.length} authorized user${admins.length !== 1 ? 's' : ''}`}</p>
                        </div>

                        {status && (
                            <div className={`access-status ${status.type}`}>
                                {status.type === 'success' ? '✅' : '❌'} {status.message}
                            </div>
                        )}

                        <div className="admin-list">
                            {loading ? (
                                <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--fpg-gray)' }}>Loading admins...</div>
                            ) : admins.map((admin, i) => {
                                const isYou = admin.email.toLowerCase() === session.email.toLowerCase();
                                return (
                                    <div className="admin-row" key={i}>
                                        <div className="admin-info">
                                            <div className="admin-avatar">{getInitials(admin.name)}</div>
                                            <div className="admin-details">
                                                <h4>
                                                    {admin.name}
                                                    {isYou && <span className="you-badge">You</span>}
                                                </h4>
                                                <p>{admin.email}</p>
                                                {admin.addedAt && admin.addedBy !== 'system' && (
                                                    <p style={{ fontSize: '0.75rem', marginTop: '0.2rem' }}>
                                                        Added by {admin.addedBy} · {formatDate(admin.addedAt)}
                                                    </p>
                                                )}
                                            </div>
                                        </div>
                                        {!isYou && (
                                            <button className="btn-remove-admin" onClick={() => handleRemove(admin.email, admin.name)}>
                                                Remove
                                            </button>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Add New Admin */}
                    <div className="access-card">
                        <div className="access-card-header">
                            <h3>➕ Add New Admin</h3>
                            <p>They will receive an email invitation with the portal link</p>
                        </div>
                        <div className="add-admin-form">
                            <div className="add-admin-row">
                                <input
                                    type="text"
                                    className="form-input"
                                    placeholder="Full Name"
                                    value={newName}
                                    onChange={(e) => setNewName(e.target.value)}
                                />
                                <input
                                    type="email"
                                    className="form-input"
                                    placeholder="email@foundationpartners.com"
                                    value={newEmail}
                                    onChange={(e) => setNewEmail(e.target.value)}
                                />
                            </div>

                            {newName && newEmail && (
                                <div className="invite-preview">
                                    <strong>📧 Invite email preview:</strong>
                                    <span>To: {newEmail}</span><br />
                                    <span>Subject: <em>Equipment Admin Access Approved by Fred Solano</em></span><br />
                                    <span>Body: Hi {newName}, you have been granted access to the FPG Equipment Admin Portal...</span>
                                </div>
                            )}

                            <button className="btn-add-admin" onClick={handleAdd} disabled={adding}>
                                {adding ? '⏳ Adding...' : '✅ Add Admin & Send Invite'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
