name: Keep Azure Function Alive

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Azure Function
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Content-Type: application/json" -H "x-admin-email: fred.solano@foundationpartners.com" -d '{"action":"get-admins"}' "https://fpg-equipment-function-b1.azurewebsites.net/api/publish-products")
          echo "Response: $response"
          if [ "$response" = "200" ]; then echo "Azure Function is alive"; else echo "Warning: $response"; fi