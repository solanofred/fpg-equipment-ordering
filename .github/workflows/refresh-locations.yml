name: Refresh Location List

on:
  schedule:
    - cron: '0 11 * * *'  # 6am EST / 7am EDT daily
    - cron: '0 22 * * *'  # 5pm EST / 6pm EDT daily
  workflow_dispatch:       # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh locations from SharePoint
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-admin-email: fred.solano@foundationpartners.com" \
            -d '{"action":"refresh-locations"}' \
            "https://fpg-equipment-function-b1.azurewebsites.net/api/publish-products")
          echo "HTTP status: $response"
          echo "Response: $(cat /tmp/response.json)"
          if [ "$response" = "200" ]; then
            echo "✅ Locations refreshed successfully"
          else
            echo "⚠️ Refresh returned status $response"
            exit 1
          fi
